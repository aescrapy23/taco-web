  for (let y = 0; y < rows; y++) { grid[y * cols] = 1; grid[y * cols + cols - 1] = 1; }

  const sx = Math.floor(cols / 2), sy = Math.floor(rows / 2);

    for (let bx = 1; bx + 2 < cols - 1; bx += P) {
      if (Math.random() < 0.2) continue; // plaza / parque (sin edificio)
      const bw = randi(3, 6), bh = randi(3, 6);
      const x1 = Math.min(bx + bw, cols - 2), y1 = Math.min(by + bh, rows - 2);

      for (let y = by; y < y1; y++) for (let x = bx; x < x1; x++) grid[y * cols + x] = 1;
      // ~16% son LANDMARKS: torres altas de color neon con baliza = focos visuales que rompen la grilla

      // tinte en clave del TEMA (no gris): mayoria pared, ~28% acento claro (stud); landmark = torre del color neon
      const accent = Math.random() < 0.28;
      const tint = landmark
        ? mixHex(shadeHex(neon, 0.42), "#202840", 0.42)
        : mixHex(shadeHex(accent ? theme.stud : theme.wall, 0.5 + Math.random() * 0.45), "#5a6275", 0.12 + Math.random() * 0.18);
      const isShop = !landmark && Math.random() < 0.5;

function update(dt) {

  if (state === "play" && !paused) { daySec += dt; kpi.playSec = (kpi.playSec || 0) + dt; kpiDirty = true; achT -= dt; if (achT <= 0) { achT = 1.2; achCheck(); } }
  if (achToast) { achToast.t -= dt; if (achToast.t <= 0) achToast = null; }
  if (menuMsgT > 0) menuMsgT -= dt;
  tod = (daySec % dayLen) / dayLen;
  nightAmt = 0.5 - 0.5 * Math.cos(tod * 2 * Math.PI); // 0 = mediodia, 1 = medianoche
  const tbase = weather.kind === "sol" ? 27 : weather.kind === "nubes" ? 20 : 16;
  weather.temp = Math.round(tbase - nightAmt * 9 + Math.sin(daySec * 0.05) * 1.5);
  if (weather.kind === "lluvia" && state === "play" && !paused) {
    if (rain.length < 130) for (let i = 0; i < 6; i++) rain.push({ x: Math.random() * W, y: -10, v: 620 + Math.random() * 320, len: 11 + Math.random() * 10 });
    for (let i = rain.length - 1; i >= 0; i--) { const r = rain[i]; r.y += r.v * dt; r.x -= r.v * 0.25 * dt; if (r.y > H) rain.splice(i, 1); }
  } else if (rain.length) rain.length = 0;
  if (shake > 0) shake = Math.max(0, shake - dt * 30);
  if (flashT > 0) flashT -= dt;
  for (let i = floaters.length - 1; i >= 0; i--) { const f = floaters[i]; f.life -= dt * 1.1; f.y -= 26 * dt; if (f.life <= 0) floaters.splice(i, 1); }
  for (const a of ambient) { a.x += a.vx * dt; a.y += a.vy * dt; if (a.x < -10) a.x = W + 10; else if (a.x > W + 10) a.x = -10; if (a.y < -10) a.y = H + 10; else if (a.y > H + 10) a.y = -10; }
  if (bannerT > 0) bannerT -= dt;
  for (let i = rings.length - 1; i >= 0; i--) { const rg = rings[i]; rg.r += (rg.max - rg.r) * dt * 6; rg.life -= dt * 1.6; if (rg.life <= 0) rings.splice(i, 1); }

  if (state === "kpis") { return; }
  if (state === "logros") { return; }

      ctx.fillStyle = "#d64545"; ctx.beginPath(); ctx.moveTo(b.r, 0); ctx.lineTo(b.r * 0.3, -b.r * 0.4); ctx.lineTo(b.r * 0.3, b.r * 0.4); ctx.closePath(); ctx.fill();
      ctx.restore();
    } else { ctx.fillStyle = "#ff8c32"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill(); ctx.fillStyle = "#ffe896"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.5, 0, 7); ctx.fill(); }
  }
  for (const s of eshots) { ctx.fillStyle = "#78d2eb"; ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, 7); ctx.fill(); ctx.fillStyle = "#dff4ff"; ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, 7); ctx.fill(); }
  for (const c of cars) drawCar(c);
  for (const p of peds) drawPed(p);
  for (const e of enemies) { drawEnemy(e); if (e.hp < e.maxhp && !e.boss) bar(e.x - e.r, e.y - e.r - 8, e.r * 2, 4, e.hp / e.maxhp, "#60d050"); }
  // SINCRONIZAR profundidad: si un auto/gente/enemigo queda sobre la fachada de un edificio, redibujo el edificio encima (pasa por DETRAS)
  for (const b of cityBlocks) {
    const bx0 = b.x * TS, bx1 = (b.x + b.w) * TS, by0 = b.y * TS, by1 = (b.y + b.h) * TS, EHb = b.landmark ? 72 + (b.seed % 4) * 15 : 28 + (b.seed % 5) * 13;
    const ins = o => o && o.x > bx0 - 8 && o.x < bx1 + EHb + 8 && o.y > by0 - 24 && o.y < by1 + EHb + 6;
    let over = false;
    for (const c of cars) if (c !== driving && ins(c)) { over = true; break; }
    if (!over) for (const p of peds) if (ins(p)) { over = true; break; }
    if (!over) for (const e of enemies) if (ins(e)) { over = true; break; }
    if (over) draw3DBuilding(ctx, b);
  }
  for (const rg of rings) { ctx.globalAlpha = clamp(rg.life, 0, 1) * 0.7; ctx.strokeStyle = rg.col; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r, 0, 7); ctx.stroke(); }
  ctx.globalAlpha = 1;
  if (!(player.inv > 0 && Math.floor(t * 20) % 2)) drawTaco(player.x, player.y - (driving ? 8 : 0), player.r * (driving ? 1.5 : 2.2), level);
  if (!driving) { const cd = dashCD <= 0 ? 1 : 1 - dashCD / 0.9; ctx.globalAlpha = dashCD <= 0 ? 0.3 + 0.22 * Math.sin(t * 6) : 0.55; ctx.strokeStyle = "#5eead4"; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 11, -Math.PI / 2, -Math.PI / 2 + cd * 2 * Math.PI); ctx.stroke(); ctx.globalAlpha = 1; }
  for (const p of parts) { ctx.globalAlpha = clamp(p.life / p.max, 0, 1); ctx.fillStyle = p.col; ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r); }
  for (const f of floaters) { ctx.globalAlpha = clamp(f.life, 0, 1); text(f.txt, f.x, f.y, 17, f.col, "center"); }
  ctx.globalAlpha = 1;
  ctx.restore();
  // polvo de ambiente (solo graficos ALTA)
  if (glowOn()) { for (const a of ambient) { ctx.globalAlpha = 0.2 + 0.26 * (0.5 + 0.5 * Math.sin(t * 2 + a.tw)); ctx.fillStyle = theme.stud; ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, 7); ctx.fill(); } ctx.globalAlpha = 1; }
  // dia/noche + clima (faroles, sol/luna, lluvia)
  if (state === "play" || state === "quiz" || state === "shop") drawWeatherSky();

  // Viñeta + destello (4D)
  const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.38, W / 2, H / 2, Math.max(W, H) * 0.74);
  vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(0,0,0,0.28)");
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  if (flashT > 0) { ctx.fillStyle = "rgba(" + flashCol + "," + (0.4 * flashT / flashMax) + ")"; ctx.fillRect(0, 0, W, H); }
  // pulso rojo con poca vida (tension)
  if (state === "play" && player.hp < MAXHP * 0.3) { const pz = 0.1 + 0.12 * (0.5 + 0.5 * Math.sin(t * 8)); const vg2 = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.7); vg2.addColorStop(0, "rgba(0,0,0,0)"); vg2.addColorStop(1, "rgba(220,40,40," + pz + ")"); ctx.fillStyle = vg2; ctx.fillRect(0, 0, W, H); }
  drawElite(); // post-FX cinematografico (MODO ELITE)

  if (state === "play" || state === "quiz" || state === "shop") { drawHUD(); }
  drawAI();
  drawThermalRadar();
  drawAchToast();
  if (state === "play") { drawMinimap(); drawStick(stickL, "rgba(94,234,212,0.5)"); drawStick(stickR, "rgba(255,150,60,0.6)"); drawButtons(); }
  if (bannerT > 0 && (state === "play" || state === "quiz")) { const a = clamp(bannerT / 0.6, 0, 1) * clamp((2.4 - bannerT) / 0.3, 0, 1); ctx.globalAlpha = a; text("MUNDO " + level, W / 2, H * 0.3, Math.min(46, W / 9), "#fff", "center"); text(theme.name, W / 2, H * 0.3 + 38, Math.min(32, W / 11), hexA(theme.stud, 1), "center"); text("MISION: " + (mission ? mission.text : "junta las gemas"), W / 2, H * 0.3 + 70, 14, "#f5cd46", "center"); ctx.globalAlpha = 1; }
  if (state === "quiz") drawQuiz();
  if (state === "shop") drawShop();
  if (state === "wardrobe") drawWardrobe();
  if (state === "options") drawOptions();
  if (state === "menu") drawMenu();
  if (state === "bodega") drawBodega();
  if (state === "kpis") drawKpis();
  if (state === "logros") drawLogros();
  if (state === "academia") drawAcademia();
  if (state === "mirador") drawMirador();
  if (state === "ia") drawIA();
  if (state === "interior") drawInterior();
  if (state === "store") drawStore();
  if (state === "build") drawBuild();
  if (state === "roulette") drawRoulette();
  if (state === "memory") drawMemory();
  if (state === "uno") drawUno();
  if (state === "trivia") drawTrivia();
  if (state === "anagram") drawAnagram();
  if (state === "mathq") drawMath();
  if (state === "seq") drawSeq();
  if (state === "cine") drawCine();
  if (state === "challenge") drawChallenge();
  if (state === "players") drawPlayers();
  if (paused && state === "play") { ctx.fillStyle = "rgba(6,6,12,0.6)"; ctx.fillRect(0, 0, W, H); text("PAUSA", W / 2, H / 2, 48, "#f5cd46", "center"); text("toca II para seguir", W / 2, H / 2 + 40, 16, "#9a9ab0", "center"); drawButtons(); }
  if (state === "title") {
    ctx.fillStyle = "rgba(8,8,16,0.62)"; ctx.fillRect(0, 0, W, H);
    drawTaco(W / 2, H / 2 - 140, Math.min(70, W / 6), 7); // taco evolucionado de muestra
    text("CATACOMB", W / 2, H / 2 - 50, Math.min(72, W / 7), "#f5cd46", "center");
    text("el taco en la catacumba", W / 2, H / 2 - 8, 18, "#96c8eb", "center");
    if (profile) text("Hola " + profile.name + "  ·  Ingles " + LESSONS.EN.levels[profile.eng].tag + "  ·  Chino " + LESSONS.ZH.levels[profile.zh].tag, W / 2, H / 2 + 18, 13, "#9be7c0", "center");
    const trun = curPlayer ? loadRun() : null;
    if (trun && trun.level) {
      const cr = titleContinueRect(); const pulse = 0.5 + 0.5 * Math.sin(t * 4);
      ctx.shadowColor = "#62e074"; ctx.shadowBlur = 8 + pulse * 8; ctx.fillStyle = "#16341f"; ctx.beginPath(); ctx.roundRect(cr.x, cr.y, cr.w, cr.h, 12); ctx.fill(); ctx.shadowBlur = 0; ctx.strokeStyle = "#62e074"; ctx.lineWidth = 3; ctx.stroke();
      text("CONTINUAR  ·  Mundo " + trun.level, cr.x + cr.w / 2, cr.y + cr.h / 2 + 7, 19, "#9be7c0", "center");
      text("tocá la pantalla = NUEVA partida", W / 2, cr.y + cr.h + 22, 13, "#8a8aa0", "center");
    } else text("TOCA PARA JUGAR", W / 2, H / 2 + 52, 22, "#f5cd46", "center");
    text("izq: mover (doble-toque = esquive) · der: apuntar/disparar", W / 2, H / 2 + 88, 14, "#8a8aa0", "center");
    text("dimensiones, tiendas, minimapa · aprende INGLES y CHINO (frases)", W / 2, H / 2 + 112, 13, "#7a7a90", "center");
    const wr = titleWbRect();
    ctx.fillStyle = "#2a2030"; ctx.strokeStyle = "#f5cd46"; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(wr.x, wr.y, wr.w, wr.h, 10); ctx.fill(); ctx.stroke();
    text("VESTUARIO", wr.x + wr.w / 2, wr.y + wr.h / 2 + 6, 15, "#f5cd46", "center");
    const orr = titleOptRect();
    ctx.fillStyle = "#1f2a30"; ctx.strokeStyle = "#7fd6ff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(orr.x, orr.y, orr.w, orr.h, 10); ctx.fill(); ctx.stroke();
    text("OPCIONES", orr.x + orr.w / 2, orr.y + orr.h / 2 + 6, 15, "#7fd6ff", "center");
    const ir = titleIsoRect(); const ip = 0.5 + 0.5 * Math.sin(t * 4);
    ctx.shadowColor = "#b480ff"; ctx.shadowBlur = 6 + ip * 8; ctx.fillStyle = "#241a33"; ctx.strokeStyle = "#b480ff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(ir.x, ir.y, ir.w, ir.h, 10); ctx.fill(); ctx.shadowBlur = 0; ctx.stroke();
    text("DIMENSION 3D (ISO)  ·  tu banco viaja con vos", ir.x + ir.w / 2, ir.y + ir.h / 2 + 5, fitFont("DIMENSION 3D (ISO)  ·  tu banco viaja con vos", ir.w - 12, 13), "#c8a0ff", "center");
    text("build " + VERSION, W / 2, H - 14 - safeB, 11, "#586", "center");
  }
  if (state === "over") {
    ctx.fillStyle = "rgba(6,6,12,0.8)"; ctx.fillRect(0, 0, W, H);
    text("GAME OVER", W / 2, H / 2 - 30, Math.min(64, W / 8), "#eb5040", "center");
    let mAll = 0, tAll = 0; for (const lk of LANGS) { const md = masteredTotalL(LESSONS[lk]); mAll += md[0]; tAll += md[1]; }
    text("PUNTAJE  " + score, W / 2, H / 2 + 22, 26, "#fff", "center");
    text("APRENDIDAS " + words + "    DOMINADAS " + mAll + "/" + tAll + " (EN+ZH)", W / 2, H / 2 + 52, 15, "#60d050", "center");
    text("RECORD  " + best, W / 2, H / 2 + 76, 15, "#9a9ab0", "center");
    text("LOGROS  " + achCount() + "/" + ACHS.length + "   ·   KPIS en menu casa", W / 2, H / 2 + 98, 13, "#ffd84a", "center");
    text("TOCA PARA REINTENTAR", W / 2, H / 2 + 128, 20, "#f5cd46", "center");
  }
}

// roundRect fallback (navegadores viejos)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) { this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath(); return this; };
}

// ===== Arranque de perfiles: migrar progreso viejo (1 jugador) o pedir crear jugador =====
(function initPlayers() {
  if (players.length === 0) {
    let hadOld = null; try { hadOld = localStorage.getItem("catacomb_profile") || localStorage.getItem("catacomb_best") || localStorage.getItem("catacomb_maxworld"); } catch (e) {}
    if (hadOld) {
      let pr = null; try { pr = JSON.parse(localStorage.getItem("catacomb_profile") || "null"); } catch (e) {}
      const nm = (pr && pr.name) ? String(pr.name).slice(0, 14) : "JUGADOR 1";
      players.push(nm); curPlayer = nm; savePlayers();
      const map = { best: "catacomb_best", bank: "catacomb_bank", outfit: "catacomb_outfit", maxworld: "catacomb_maxworld", lang: "catacomb_lang", unlocked: "catacomb_unlocked", lstats: "catacomb_lstats", profile: "catacomb_profile" };
      for (const k in map) { let v = null; try { v = localStorage.getItem(map[k]); } catch (e) {} if (v != null) lset(k, v); }
      loadPlayerData(); state = "title";
    } else { state = "players"; }
  } else {
    if (!curPlayer || players.indexOf(curPlayer) < 0) curPlayer = players[0];
    loadPlayerData(); state = "title";
  }
})();

let last = performance.now();
function frame(now) { let dt = (now - last) / 1000; last = now; if (dt > 0.05) dt = 0.05; update(dt); render(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);

// PWA: instalable + offline + actualiza solo (network-first)
if ("serviceWorker" in navigator) { try { navigator.serviceWorker.register("sw.js"); } catch (e) {} }
// guardar la partida en curso al ocultar/cerrar (para CONTINUAR donde se quedo)
document.addEventListener("visibilitychange", () => { if (document.hidden && state === "play") saveRun(); });
window.addEventListener("pagehide", () => { if (state === "play") saveRun(); });
</script>
