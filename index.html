<script>
"use strict";
const VERSION = "v9 - tiradores + ambiente + estela + dominio";
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let W = 0, H = 0, DPR = 1;
let TS = 56;
let cols = 0, rows = 0;
let grid = [];
const dcanvas = document.createElement("canvas");
const dctx = dcanvas.getContext("2d");

let safeB = 0, safeT = 0;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const vv = window.visualViewport;
  W = Math.round(vv ? vv.width : window.innerWidth);
  H = Math.round(vv ? vv.height : window.innerHeight);
  canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  const cs = getComputedStyle(document.documentElement);
  safeB = parseInt(cs.getPropertyValue("--sab")) || 0;
  safeT = parseInt(cs.getPropertyValue("--sat")) || 0;
}
let _rt = null;
function onResize() {
  resize();
  if (_rt) clearTimeout(_rt);
  _rt = setTimeout(() => {
    if (state === "play" || state === "quiz") {
      const ts2 = clamp(Math.round(Math.min(W, H) / 13), 44, 64);
      const nc = Math.max(10, Math.floor(W / ts2)), nr = Math.max(8, Math.floor(H / ts2));
      if (nc !== cols || nr !== rows) genLevel();
    }
  }, 220);
}
window.addEventListener("resize", onResize);
window.addEventListener("orientationchange", onResize);
if (window.visualViewport) window.visualViewport.addEventListener("resize", onResize);
resize();

// ---------- Utils ----------
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const len = (x, y) => Math.hypot(x, y);
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = clamp(Math.round(r * f), 0, 255); g = clamp(Math.round(g * f), 0, 255); b = clamp(Math.round(b * f), 0, 255);
  return "rgb(" + r + "," + g + "," + b + ")";
}
function rot(x, y, deg) { const r = deg * Math.PI / 180, c = Math.cos(r), s = Math.sin(r); return [x * c - y * s, x * s + y * c]; }
function hexA(hex, a) { const n = parseInt(hex.slice(1), 16); return "rgba(" + ((n >> 16) & 255) + "," + ((n >> 8) & 255) + "," + (n & 255) + "," + a + ")"; }

// ---------- Audio ----------
let actx = null, mute = false;
function audioInit() { if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } if (actx && actx.state === "suspended") actx.resume(); }
function beep(freq, dur, type, vol) {
  if (!actx || mute) return;
  try {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "square"; o.frequency.value = freq; g.gain.value = vol || 0.05;
    o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime; g.gain.setValueAtTime(g.gain.value, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur); o.start(t); o.stop(t + dur);
  } catch (e) {}
}
const sGem = () => beep(880, 0.12, "sine", 0.06);
const sShoot = () => beep(520, 0.05, "square", 0.025);
const sHit = () => beep(160, 0.1, "sawtooth", 0.05);
const sKill = () => { beep(440, 0.08, "square", 0.05); setTimeout(() => beep(660, 0.1, "square", 0.05), 60); };
const sHurt = () => beep(120, 0.22, "sawtooth", 0.08);
const sPower = () => { [659, 880, 1175].forEach((f, i) => setTimeout(() => beep(f, 0.1, "square", 0.05), i * 55)); };
const sLevel = () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 0.12, "triangle", 0.05), i * 70)); };
const sRight = () => { [659, 988, 1319].forEach((f, i) => setTimeout(() => beep(f, 0.1, "triangle", 0.06), i * 60)); };
const sWrong = () => beep(180, 0.3, "square", 0.07);

// ---------- Datos ----------
// Dimensiones tipo Roblox: cada una con su nombre y paleta VIVA
const PALETTES = [
  { name: "CAVERNA", wall: "#4a73d6", floor: "#1a2030", stud: "#6b90e6" },
  { name: "BOSQUE",  wall: "#39a85a", floor: "#142318", stud: "#5fd07e" },
  { name: "ARCANO",  wall: "#9a52e0", floor: "#221830", stud: "#bd84ff" },
  { name: "VOLCAN",  wall: "#e0653a", floor: "#2a1610", stud: "#ff9060" },
  { name: "HIELO",   wall: "#3ec0d8", floor: "#10222a", stud: "#7fe6f5" },
  { name: "NEON",    wall: "#e0479a", floor: "#220f1c", stud: "#ff86c4" },
];
let theme = PALETTES[0];

// Armas: nombre, cadencia, velocidad, perdigones, abanico, vida, radio
const WEAPONS = [
  { name: "SALSA", cd: 0.17, speed: 640, pellets: 1, spread: 0, life: 0.9, r: 7, dmg: 1 },
  { name: "ESCOPETA", cd: 0.52, speed: 560, pellets: 5, spread: 32, life: 0.45, r: 6, dmg: 1 },
  { name: "RAFAGA", cd: 0.08, speed: 780, pellets: 1, spread: 7, life: 0.7, r: 5, dmg: 1 },
];

// ===== Aprendizaje ELITE: multi-idioma por niveles (Ingles CEFR/TOEFL + Chino HSK), palabras y FRASES =====
// item EN: [es, en]   |   item ZH: [es, hanzi, pinyin]
const LESSONS = {
  EN: { name: "INGLES", code: "en-US", levels: [
    { tag: "A1", items: [["HOLA", "HELLO"], ["GATO", "CAT"], ["PERRO", "DOG"], ["AGUA", "WATER"], ["SOL", "SUN"], ["CASA", "HOUSE"], ["ROJO", "RED"], ["SI", "YES"], ["GRACIAS", "THANK YOU"], ["UNO", "ONE"], ["AMIGO", "FRIEND"], ["COMIDA", "FOOD"]] },
    { tag: "A2", items: [["BUENOS DIAS", "GOOD MORNING"], ["COMO ESTAS", "HOW ARE YOU"], ["ME LLAMO ANA", "MY NAME IS ANA"], ["TENGO HAMBRE", "I AM HUNGRY"], ["QUIERO AGUA", "I WANT WATER"], ["GATO NEGRO", "BLACK CAT"], ["HASTA LUEGO", "SEE YOU LATER"], ["ME GUSTA", "I LIKE IT"]] },
    { tag: "B1", items: [["ESTOY APRENDIENDO INGLES", "I AM LEARNING ENGLISH"], ["ME GUSTA ESTE JUEGO", "I LIKE THIS GAME"], ["NECESITO AYUDA", "I NEED HELP"], ["VAMOS A JUGAR", "LET US PLAY"], ["HOY HACE CALOR", "IT IS HOT TODAY"], ["NO ENTIENDO", "I DO NOT UNDERSTAND"]] },
    { tag: "B2 / TOEFL", items: [["AUNQUE LLUEVA, IRE", "ALTHOUGH IT RAINS, I WILL GO"], ["DEBERIAS HABERLO DICHO", "YOU SHOULD HAVE SAID IT"], ["CUANTO ANTES MEJOR", "THE SOONER THE BETTER"], ["VALE LA PENA INTENTARLO", "IT IS WORTH TRYING"], ["ESTOY DE ACUERDO", "I AGREE WITH YOU"], ["DEPENDE DE TI", "IT IS UP TO YOU"]] },
    { tag: "C1 / TOEFL", items: [["A PESAR DE LOS OBSTACULOS", "DESPITE THE OBSTACLES"], ["TAN PRONTO COMO LLEGUE", "AS SOON AS HE ARRIVES"], ["LO HABRIA HECHO", "I WOULD HAVE DONE IT"], ["SIN LUGAR A DUDAS", "WITHOUT A DOUBT"], ["EN RESUMIDAS CUENTAS", "IN A NUTSHELL"], ["ME DI CUENTA TARDE", "I REALIZED IT LATE"]] },
  ] },
  ZH: { name: "CHINO", code: "zh-CN", levels: [
    { tag: "HSK1", items: [["HOLA", "你好", "ni hao"], ["GRACIAS", "谢谢", "xie xie"], ["CORRECTO", "对", "dui"], ["NO", "不", "bu"], ["AGUA", "水", "shui"], ["YO", "我", "wo"], ["TU", "你", "ni"], ["BUENO", "好", "hao"], ["UNO", "一", "yi"], ["GATO", "猫", "mao"]] },
    { tag: "HSK2", items: [["BUENOS DIAS", "早上好", "zaoshang hao"], ["ADIOS", "再见", "zai jian"], ["COMO ESTAS", "你好吗", "ni hao ma"], ["MUY BIEN", "很好", "hen hao"], ["GRACIAS A TI", "谢谢你", "xie xie ni"], ["COMER", "吃饭", "chi fan"], ["BEBER AGUA", "喝水", "he shui"], ["MI AMIGO", "我的朋友", "wo de pengyou"]] },
    { tag: "HSK3", items: [["ME GUSTA", "我喜欢", "wo xihuan"], ["TE QUIERO", "我爱你", "wo ai ni"], ["NO ENTIENDO", "我不懂", "wo bu dong"], ["ESTOY APRENDIENDO", "我在学习", "wo zai xuexi"], ["DONDE ESTA", "在哪里", "zai nali"], ["CUANTO CUESTA", "多少钱", "duoshao qian"]] },
  ] },
};
const LANGS = ["EN", "ZH"];
let lang = localStorage.getItem("catacomb_lang") || "EN";
if (LANGS.indexOf(lang) < 0) lang = "EN";
let lstats = {}; try { lstats = JSON.parse(localStorage.getItem("catacomb_lstats") || "{}"); } catch (e) { lstats = {}; }
function saveL() { try { localStorage.setItem("catacomb_lstats", JSON.stringify(lstats)); } catch (e) {} }
function itemKey(it) { return it[1]; }
function lstat(k) { return lstats[k] || (lstats[k] = { seen: 0, ok: 0, streak: 0 }); }
function masteredK(k) { const s = lstats[k]; return !!s && s.streak >= 3; }
function dispOf(L, it) { return L.code === "zh-CN" ? it[1] + "  " + it[2] : it[1]; }
function levelMastered(L, lv) { let n = 0; for (const it of lv.items) if (masteredK(itemKey(it))) n++; return n; }
function langTierIdx(L) { for (let i = 0; i < L.levels.length - 1; i++) if (levelMastered(L, L.levels[i]) < 5) return i; return L.levels.length - 1; }
function masteredTotalL(L) { let n = 0, tot = 0; for (const lv of L.levels) for (const it of lv.items) { tot++; if (masteredK(itemKey(it))) n++; } return [n, tot]; }
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = randi(0, i + 1); const tmp = a[i]; a[i] = a[j]; a[j] = tmp; } return a; }
function pickItem() {
  const L = LESSONS[lang], top = langTierIdx(L), pool = [];
  for (let i = 0; i <= top; i++) for (const it of L.levels[i].items) pool.push({ it, tier: i });
  const weights = pool.map(p => { const s = lstats[itemKey(p.it)]; let w = !s || s.seen === 0 ? 3 : s.streak === 0 ? 5 : s.streak < 3 ? 3 : 1; if (p.tier === top) w += 1; return w; });
  let total = 0; for (const x of weights) total += x;
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) { r -= weights[i]; if (r <= 0) return { L, item: pool[i].it }; }
  return { L, item: pool[pool.length - 1].it };
}
function speak(txt, code) { try { if (!mute && window.speechSynthesis) { const u = new SpeechSynthesisUtterance(txt); u.lang = code || "en-US"; u.rate = 0.85; speechSynthesis.cancel(); speechSynthesis.speak(u); } } catch (e) {} }

// ---------- Estado ----------
let state = "title";  // title | play | quiz | over
let paused = false;
let level = 1, score = 0, best = +(localStorage.getItem("catacomb_best") || 0), words = 0;
const MAXHP = 100;
const player = { x: 0, y: 0, r: 18, vx: 0, vy: 0, hp: MAXHP, inv: 0, aimx: 1, aimy: 0, fire: 0 };
let gems = [], enemies = [], bullets = [], parts = [], heals = [], powerDrops = [], eshots = [], portal = null;
let pShield = 0, pTriple = 0, pRapid = 0, weapon = 0;
let shake = 0, t = 0;
let quiz = null; // {prompt, options[], correct, sel, fb}
// Juice 4D: texto flotante, combo de bajas, destello de pantalla
let floaters = [], combo = 0, comboT = 0, flashT = 0, flashMax = 0.001, flashCol = "255,255,255";
let walkPhase = 0, playerMoving = false; // animacion del taco humanoide
function floatText(x, y, txt, col) { floaters.push({ x, y, txt, col, life: 1.0 }); }
function flash(col, dur) { flashCol = col; flashT = dur; flashMax = dur; }

function solid(tx, ty) { if (tx < 0 || ty < 0 || tx >= cols || ty >= rows) return true; return grid[ty * cols + tx] === 1; }
function isFloor(px, py) { return !solid(Math.floor(px / TS), Math.floor(py / TS)); }
function freeCell() {
  for (let i = 0; i < 400; i++) { const tx = randi(1, cols - 1), ty = randi(1, rows - 1); if (!solid(tx, ty)) return { x: (tx + 0.5) * TS, y: (ty + 0.5) * TS }; }
  return { x: W / 2, y: H / 2 };
}
function farFree(fx, fy) {
  let b = null, bd = -1;
  for (let i = 0; i < 300; i++) { const tx = randi(1, cols - 1), ty = randi(1, rows - 1); if (solid(tx, ty)) continue; const cx = (tx + 0.5) * TS, cy = (ty + 0.5) * TS; const d = (cx - fx) * (cx - fx) + (cy - fy) * (cy - fy); if (d > bd) { bd = d; b = { x: cx, y: cy }; } }
  return b || freeCell();
}

// ---------- Nivel ----------
function genLevel() {
  theme = PALETTES[(level - 1) % PALETTES.length];
  TS = clamp(Math.round(Math.min(W, H) / 13), 44, 64);
  cols = Math.max(10, Math.floor(W / TS));
  rows = Math.max(8, Math.floor(H / TS));
  grid = new Array(cols * rows).fill(0);
  for (let x = 0; x < cols; x++) { grid[x] = 1; grid[(rows - 1) * cols + x] = 1; }
  for (let y = 0; y < rows; y++) { grid[y * cols] = 1; grid[y * cols + cols - 1] = 1; }
  const clusters = 4 + level;
  for (let c = 0; c < clusters; c++) {
    const bx = randi(2, cols - 3), by = randi(2, rows - 3), bw = randi(1, 4), bh = randi(1, 3);
    for (let y = by; y < Math.min(by + bh, rows - 2); y++) for (let x = bx; x < Math.min(bx + bw, cols - 2); x++) grid[y * cols + x] = 1;
  }
  const sx = Math.floor(cols / 2), sy = Math.floor(rows / 2);
  for (let y = sy - 1; y <= sy + 1; y++) for (let x = sx - 1; x <= sx + 1; x++) if (x > 0 && y > 0 && x < cols - 1 && y < rows - 1) grid[y * cols + x] = 0;

  player.x = (sx + 0.5) * TS; player.y = (sy + 0.5) * TS; player.vx = player.vy = 0;
  gems = []; enemies = []; bullets = []; parts = []; heals = []; powerDrops = []; eshots = []; portal = null;
  const ng = 4 + level;
  for (let i = 0; i < ng; i++) { const p = freeCell(); gems.push({ x: p.x, y: p.y }); }
  const ne = 2 + level;
  for (let i = 0; i < ne; i++) spawnEnemy(false);
  if (level % 5 === 0) spawnEnemy(true); // jefe cada 5 niveles
  buildDungeonCache();
}

function spawnEnemy(boss) {
  let p;
  for (let i = 0; i < 30; i++) { p = freeCell(); if (len(p.x - player.x, p.y - player.y) > 220) break; }
  if (boss) {
    enemies.push({ x: p.x, y: p.y, vx: 0, vy: 0, r: 40, hp: 18 + level * 2, maxhp: 18 + level * 2, speed: 50 + level * 2, col: "#ba40d0", bounty: 500, dmg: 22, flash: 0, boss: true });
    return;
  }
  const roll = Math.random();
  let e;
  if (roll < 0.48) e = { x: p.x, y: p.y, vx: 0, vy: 0, r: 16, hp: 3, speed: 95 + level * 6, col: "#e24a3c", bounty: 30, dmg: 10 };           // perseguidor
  else if (roll < 0.74) e = { x: p.x, y: p.y, vx: 0, vy: 0, r: 26, hp: 6, speed: 55 + level * 3, col: "#9698a4", bounty: 60, dmg: 16 };       // tanque
  else e = { x: p.x, y: p.y, vx: 0, vy: 0, r: 16, hp: 3, speed: 70 + level * 3, col: "#78d2eb", bounty: 80, dmg: 12, shoot: Math.random() * 1.7 }; // tirador (kiting + dispara)
  e.maxhp = e.hp; e.flash = 0; e.boss = false;
  enemies.push(e);
}

function moveAxis(e, dx, dy) {
  e.x += dx; e.y += dy; const r = e.r;
  const x0 = Math.floor((e.x - r) / TS), x1 = Math.floor((e.x + r) / TS), y0 = Math.floor((e.y - r) / TS), y1 = Math.floor((e.y + r) / TS);
  for (let ty = y0; ty <= y1; ty++) for (let tx = x0; tx <= x1; tx++) {
    if (!solid(tx, ty)) continue;
    if (dx > 0) e.x = tx * TS - r - 0.01; else if (dx < 0) e.x = (tx + 1) * TS + r + 0.01;
    if (dy > 0) e.y = ty * TS - r - 0.01; else if (dy < 0) e.y = (ty + 1) * TS + r + 0.01;
  }
}

// ---------- UI buttons (touch) ----------
function buttons() {
  if (state !== "play") return [];
  const s = Math.max(40, Math.min(50, Math.round(W * 0.062))), m = 10, y = m + safeT;
  let x = W - m; const arr = [];
  const add = (id, w) => { x -= w; arr.push({ id, x, y, w, h: s }); x -= 8; };
  add("mute", s); add("pause", s); add("weapon", Math.max(66, Math.round(s * 1.5))); add("lang", s);
  return arr;
}
function btnAt(px, py) { for (const b of buttons()) if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) return b.id; return null; }
function cycleLang() { lang = LANGS[(LANGS.indexOf(lang) + 1) % LANGS.length]; try { localStorage.setItem("catacomb_lang", lang); } catch (e) {} }
function doButton(id) {
  if (id === "mute") { mute = !mute; if (!mute) sGem(); }
  else if (id === "pause") { paused = !paused; }
  else if (id === "weapon") { weapon = (weapon + 1) % WEAPONS.length; sShoot(); }
  else if (id === "lang") { cycleLang(); sRight(); }
}

// ---------- Input ----------
const keys = {};
let mouse = { x: 0, y: 0, down: false };
addEventListener("keydown", e => {
  const k = e.key.toLowerCase(); keys[k] = true; audioInit();
  if (state === "title" || state === "over") { startOrRestart(); return; }
  if (state === "quiz") { if (k >= "1" && k <= "3") answerQuiz(+k - 1); return; }
  if (k === "1") weapon = 0; if (k === "2") weapon = 1; if (k === "3") weapon = 2;
  if (k === "p") paused = !paused; if (k === "m") { mute = !mute; } if (k === "l") cycleLang();
});
addEventListener("keyup", e => { keys[e.key.toLowerCase()] = false; });
canvas.addEventListener("mousemove", e => { mouse.x = e.clientX; mouse.y = e.clientY; });
canvas.addEventListener("mousedown", e => {
  mouse.down = true; audioInit();
  if (state === "title" || state === "over") { startOrRestart(); return; }
  if (state === "quiz") { const o = quizOptAt(e.clientX, e.clientY); if (o >= 0) answerQuiz(o); return; }
  const b = btnAt(e.clientX, e.clientY); if (b) { doButton(b); mouse.down = false; }
});
addEventListener("mouseup", () => { mouse.down = false; });
canvas.addEventListener("contextmenu", e => e.preventDefault());

const stickL = { id: null, bx: 0, by: 0, x: 0, y: 0 };
const stickR = { id: null, bx: 0, by: 0, x: 0, y: 0 };
function onTouchStart(e) {
  e.preventDefault(); audioInit();
  if (state === "title" || state === "over") { startOrRestart(); return; }
  for (const tch of e.changedTouches) {
    const x = tch.clientX, y = tch.clientY;
    if (state === "quiz") { const o = quizOptAt(x, y); if (o >= 0) answerQuiz(o); continue; }
    const b = btnAt(x, y); if (b) { doButton(b); continue; }
    if (paused) continue;
    if (x < W / 2 && stickL.id === null) { stickL.id = tch.identifier; stickL.bx = stickL.x = x; stickL.by = stickL.y = y; }
    else if (x >= W / 2 && stickR.id === null) { stickR.id = tch.identifier; stickR.bx = stickR.x = x; stickR.by = stickR.y = y; }
  }
}
function onTouchMove(e) {
  e.preventDefault();
  for (const tch of e.changedTouches) {
    if (tch.identifier === stickL.id) { stickL.x = tch.clientX; stickL.y = tch.clientY; }
    else if (tch.identifier === stickR.id) { stickR.x = tch.clientX; stickR.y = tch.clientY; }
  }
}
function onTouchEnd(e) {
  e.preventDefault();
  for (const tch of e.changedTouches) {
    if (tch.identifier === stickL.id) stickL.id = null;
    else if (tch.identifier === stickR.id) stickR.id = null;
  }
}
canvas.addEventListener("touchstart", onTouchStart, { passive: false });
canvas.addEventListener("touchmove", onTouchMove, { passive: false });
canvas.addEventListener("touchend", onTouchEnd, { passive: false });
canvas.addEventListener("touchcancel", onTouchEnd, { passive: false });

function readInput() {
  let mx = 0, my = 0;
  if (keys["a"] || keys["arrowleft"]) mx -= 1;
  if (keys["d"] || keys["arrowright"]) mx += 1;
  if (keys["w"] || keys["arrowup"]) my -= 1;
  if (keys["s"] || keys["arrowdown"]) my += 1;
  if (stickL.id !== null) { const dx = stickL.x - stickL.bx, dy = stickL.y - stickL.by, d = len(dx, dy); if (d > 8) { const m = Math.min(d, 60) / 60; mx = dx / d * m; my = dy / d * m; } }
  const ml = len(mx, my); if (ml > 1) { mx /= ml; my /= ml; }
  let ax = 0, ay = 0, firing = false;
  if (stickR.id !== null) { const dx = stickR.x - stickR.bx, dy = stickR.y - stickR.by, d = len(dx, dy); if (d > 10) { ax = dx / d; ay = dy / d; } else { ax = player.aimx; ay = player.aimy; } firing = true; }
  else if (mouse.down) { const dx = mouse.x - player.x, dy = mouse.y - player.y, d = len(dx, dy); if (d > 1) { ax = dx / d; ay = dy / d; firing = true; } }
  return { mx, my, ax, ay, firing };
}

// ---------- Flujo ----------
function startOrRestart() { level = 1; score = 0; words = 0; player.hp = MAXHP; pShield = pTriple = pRapid = 0; weapon = 0; paused = false; floaters = []; combo = 0; comboT = 0; flashT = 0; genLevel(); state = "play"; sLevel(); }

function openQuiz() {
  const { L, item } = pickItem();
  const ans = dispOf(L, item);
  const all = [];
  for (const lv of L.levels) for (const it of lv.items) { const d = dispOf(L, it); if (d !== ans) all.push(d); }
  const opts = [ans]; let guard = 0;
  while (opts.length < 3 && all.length && guard++ < 300) { const o = all[randi(0, all.length)]; if (opts.indexOf(o) < 0) opts.push(o); }
  shuffle(opts);
  quiz = { L, prompt: item[0], key: itemKey(item), say: item[1], options: opts, correct: opts.indexOf(ans), sel: -1, fb: 0, t0: t };
  state = "quiz";
}
function answerQuiz(i) {
  if (!quiz || quiz.sel >= 0) return;
  quiz.sel = i;
  const s = lstat(quiz.key); s.seen++;
  if (i === quiz.correct) { s.ok++; s.streak++; score += 80; words++; floatText(player.x, player.y - 30, "+80 " + quiz.L.name, "#60d050"); flash("96,208,80", 0.18); speak(quiz.say, quiz.L.code); sRight(); }
  else { s.streak = 0; speak(quiz.say, quiz.L.code); sWrong(); }
  saveL();
  quiz.fb = 1.9;
}
function nextLevel() { level++; score += 120; player.hp = Math.min(MAXHP, player.hp + 30); genLevel(); state = "play"; flash("245,205,70", 0.3); floatText(player.x, player.y - 34, "DIMENSION " + level + "  " + theme.name, "#f5cd46"); sLevel(); }

function addParts(x, y, n, col, spd) { for (let i = 0; i < n; i++) { const a = Math.random() * Math.PI * 2, s = spd * (0.3 + Math.random()); parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 0.5, max: 0.5, col, r: 2 + Math.random() * 3 }); } }

function fire(ax, ay) {
  const w = WEAPONS[weapon];
  let pellets = w.pellets + (pTriple > 0 ? 2 : 0);
  let spread = w.spread; if (pTriple > 0 && spread < 16) spread = 16;
  for (let k = 0; k < pellets; k++) {
    const tt = pellets === 1 ? 0 : (k / (pellets - 1) - 0.5);
    const [dx, dy] = rot(ax, ay, tt * spread);
    bullets.push({ x: player.x + dx * 20, y: player.y + dy * 20, vx: dx * w.speed, vy: dy * w.speed, life: w.life, dmg: w.dmg, r: w.r });
  }
  player.aimx = ax; player.aimy = ay; player.fire = w.cd * (pRapid > 0 ? 0.45 : 1);
  addParts(player.x + ax * 20, player.y + ay * 20, 3, "#ffaa3c", 60); sShoot();
}

function applyPower(kind) { if (kind === 0) pShield = 7; else if (kind === 1) pTriple = 9; else pRapid = 9; sPower(); }
const powerCol = k => k === 0 ? "#5eead4" : k === 1 ? "#ff963c" : "#f5cd46";
const powerName = k => k === 0 ? "ESCUDO" : k === 1 ? "TRIPLE" : "RAPIDO";

function hurt(d) {
  if (player.inv > 0 || pShield > 0) return;
  player.hp -= d; player.inv = 0.7; shake = Math.min(shake + 8, 14); flash("235,80,64", 0.22); sHurt(); addParts(player.x, player.y, 14, "#eb5040", 200);
  if (player.hp <= 0) { player.hp = 0; combo = 0; best = Math.max(best, score); localStorage.setItem("catacomb_best", best); state = "over"; }
}

function update(dt) {
  t += dt;
  if (shake > 0) shake = Math.max(0, shake - dt * 30);
  if (flashT > 0) flashT -= dt;
  for (let i = floaters.length - 1; i >= 0; i--) { const f = floaters[i]; f.life -= dt * 1.1; f.y -= 26 * dt; if (f.life <= 0) floaters.splice(i, 1); }

  if (state === "quiz") {
    if (quiz && quiz.sel >= 0) { quiz.fb -= dt; if (quiz.fb <= 0) nextLevel(); }
    return;
  }
  if (state !== "play" || paused) return;

  const inp = readInput();
  const SP = 240;
  moveAxis(player, inp.mx * SP * dt, 0); moveAxis(player, 0, inp.my * SP * dt);
  playerMoving = (Math.abs(inp.mx) + Math.abs(inp.my)) > 0.12;
  walkPhase += dt * (playerMoving ? 13 : 2.5);
  if (player.inv > 0) player.inv -= dt;
  pShield = Math.max(0, pShield - dt); pTriple = Math.max(0, pTriple - dt); pRapid = Math.max(0, pRapid - dt);
  if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }
  player.fire -= dt;
  if (inp.firing && player.fire <= 0) fire(inp.ax, inp.ay);

  for (let i = gems.length - 1; i >= 0; i--) if (len(gems[i].x - player.x, gems[i].y - player.y) < player.r + 14) { addParts(gems[i].x, gems[i].y, 10, "#5eead4", 150); floatText(gems[i].x, gems[i].y, "+10", "#5eead4"); gems.splice(i, 1); score += 10; sGem(); }
  if (gems.length === 0 && !portal) portal = farFree(player.x, player.y);
  if (portal && len(portal.x - player.x, portal.y - player.y) < player.r + 22) { openQuiz(); return; }

  for (let i = heals.length - 1; i >= 0; i--) if (len(heals[i].x - player.x, heals[i].y - player.y) < player.r + 14) { player.hp = Math.min(MAXHP, player.hp + 25); addParts(heals[i].x, heals[i].y, 10, "#60d050", 150); floatText(heals[i].x, heals[i].y, "+VIDA", "#60d050"); heals.splice(i, 1); sGem(); }
  for (let i = powerDrops.length - 1; i >= 0; i--) { const pd = powerDrops[i]; if (len(pd.x - player.x, pd.y - player.y) < player.r + 16) { applyPower(pd.kind); addParts(pd.x, pd.y, 18, powerCol(pd.kind), 240); floatText(pd.x, pd.y, powerName(pd.kind) + "!", powerCol(pd.kind)); flash("94,234,212", 0.18); shake = Math.min(shake + 4, 14); powerDrops.splice(i, 1); } }

  for (const e of enemies) {
    const dx = player.x - e.x, dy = player.y - e.y, d = len(dx, dy) || 1, ux = dx / d, uy = dy / d;
    if (e.shoot !== undefined) { // tirador: mantiene distancia (kiting) y dispara
      const prefer = 230, mv = d > prefer + 45 ? 1 : d < prefer - 45 ? -1 : 0;
      moveAxis(e, ux * e.speed * mv * dt, 0); moveAxis(e, 0, uy * e.speed * mv * dt);
      e.shoot -= dt;
      if (e.shoot <= 0 && d < 640) { eshots.push({ x: e.x + ux * e.r, y: e.y + uy * e.r, vx: ux * 300, vy: uy * 300, life: 2.4 }); e.shoot = 1.7; sShoot(); }
    } else {
      moveAxis(e, ux * e.speed * dt, 0); moveAxis(e, 0, uy * e.speed * dt);
    }
    if (e.flash > 0) e.flash -= dt;
    if (d < e.r + player.r) hurt(e.dmg);
  }
  for (let i = eshots.length - 1; i >= 0; i--) {
    const s = eshots[i]; s.life -= dt; s.x += s.vx * dt; s.y += s.vy * dt;
    let dead = s.life <= 0 || !isFloor(s.x, s.y);
    if (!dead && len(s.x - player.x, s.y - player.y) < player.r + 8) { hurt(14); addParts(s.x, s.y, 6, "#78d2eb", 160); dead = true; }
    if (dead) eshots.splice(i, 1);
  }
  if (playerMoving && Math.random() < 0.5) parts.push({ x: player.x + rand(-5, 5), y: player.y + player.r * 0.5, vx: 0, vy: 0, life: 0.3, max: 0.3, col: "#e8b84e", r: 3 }); // estela/polvo

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i]; b.life -= dt; b.x += b.vx * dt; b.y += b.vy * dt;
    let dead = b.life <= 0 || !isFloor(b.x, b.y);
    if (!dead) for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      if (len(e.x - b.x, e.y - b.y) < e.r + b.r) {
        e.hp -= b.dmg; e.flash = 0.12; addParts(b.x, b.y, 5, "#ff7a40", 140); sHit();
        if (e.hp <= 0) {
          combo++; comboT = 2.6; const mult = 1 + Math.min(Math.floor(combo / 3), 4);
          const gain = e.bounty * mult; score += gain;
          floatText(e.x, e.y, "+" + gain + (mult > 1 ? " x" + mult : ""), e.boss ? "#ce82ff" : "#ffb060");
          addParts(e.x, e.y, e.boss ? 60 : 22, "#ffa040", e.boss ? 420 : 280); shake = Math.min(shake + (e.boss ? 12 : 5), 16);
          if (e.boss) flash("206,130,255", 0.25); sKill();
          if (e.boss) { for (let k = 0; k < 5; k++) heals.push({ x: e.x + rand(-50, 50), y: e.y + rand(-50, 50) }); powerDrops.push({ x: e.x, y: e.y - 30, kind: randi(0, 3) }); }
          else { if (Math.random() < 0.3) heals.push({ x: e.x, y: e.y }); if (Math.random() < 0.18) powerDrops.push({ x: e.x, y: e.y, kind: randi(0, 3) }); }
          enemies.splice(j, 1);
        }
        dead = true; break;
      }
    }
    if (dead) bullets.splice(i, 1);
  }

  for (let i = parts.length - 1; i >= 0; i--) { const p = parts[i]; p.life -= dt; p.x += p.vx * dt; p.y += p.vy * dt; p.vx *= 0.92; p.vy *= 0.92; if (p.life <= 0) parts.splice(i, 1); }
}

// ---------- Render ----------
function drawBlock(g, px, py, s, col) {
  const b = Math.max(2, s / 11);
  g.fillStyle = col; g.fillRect(px, py, s, s);
  g.fillStyle = shade(col, 1.3); g.fillRect(px, py, s, b); g.fillRect(px, py, b, s);
  g.fillStyle = shade(col, 0.6); g.fillRect(px, py + s - b, s, b); g.fillRect(px + s - b, py, b, s);
  g.fillStyle = shade(col, 1.15); g.beginPath(); g.arc(px + s / 2, py + s / 2, s * 0.22, 0, 7); g.fill();
}
function buildDungeonCache() {
  dcanvas.width = Math.ceil(cols * TS * DPR); dcanvas.height = Math.ceil(rows * TS * DPR);
  dctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  dctx.fillStyle = theme.floor; dctx.fillRect(0, 0, cols * TS, rows * TS);
  dctx.fillStyle = theme.stud;
  for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) if (!solid(x, y)) dctx.fillRect(x * TS + TS / 2 - 2, y * TS + TS / 2 - 2, 4, 4);
  for (let y = 0; y < rows; y++) for (let x = 0; x < cols; x++) if (solid(x, y)) drawBlock(dctx, x * TS, y * TS, TS, theme.wall);
}
function drawDungeon() {
  ctx.fillStyle = theme.floor; ctx.fillRect(0, 0, W, H);
  // glow ambiental con el color de la dimension
  const gr = ctx.createRadialGradient(W / 2, H * 0.42, 40, W / 2, H * 0.42, Math.max(W, H) * 0.62);
  gr.addColorStop(0, hexA(theme.stud, 0.12)); gr.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = gr; ctx.fillRect(0, 0, W, H);
  if (dcanvas.width > 0) ctx.drawImage(dcanvas, 0, 0, cols * TS, rows * TS);
}

function drawGem(x, y) { const s = 11 + Math.sin(t * 5) * 1.5; ctx.save(); ctx.translate(x, y); ctx.rotate(Math.PI / 4); ctx.fillStyle = "#5eead4"; ctx.fillRect(-s, -s, s * 2, s * 2); ctx.fillStyle = "#bff7ec"; ctx.fillRect(-s * 0.4, -s * 0.4, s * 0.8, s * 0.8); ctx.restore(); }
function drawHeal(x, y) { ctx.fillStyle = "#60d050"; ctx.beginPath(); ctx.arc(x, y, 11, 0, 7); ctx.fill(); ctx.fillStyle = "#fff"; ctx.fillRect(x - 6, y - 2, 12, 4); ctx.fillRect(x - 2, y - 6, 4, 12); }
function drawPower(x, y, kind) {
  const col = powerCol(kind), bob = Math.sin(t * 6) * 2.5; y += bob;
  ctx.globalAlpha = 0.25 + 0.25 * (0.5 + 0.5 * Math.sin(t * 8)); ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x, y, 16, 0, 7); ctx.fill(); ctx.globalAlpha = 1;
  ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x, y, 11, 0, 7); ctx.fill();
  ctx.fillStyle = "#fff";
  if (kind === 0) { ctx.fillStyle = "#13212a"; ctx.beginPath(); ctx.arc(x, y, 5, 0, 7); ctx.fill(); }
  else if (kind === 1) { for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.arc(x + i * 5, y, 1.8, 0, 7); ctx.fill(); } }
  else { ctx.fillRect(x - 2, y - 6, 3, 7); ctx.fillRect(x + 1, y - 1, 3, 7); }
}
function drawPortal(x, y) { const r = 22 + Math.sin(t * 4) * 3; for (let i = 3; i >= 0; i--) { ctx.fillStyle = "rgba(180,128,255," + (0.18 + i * 0.12) + ")"; ctx.beginPath(); ctx.arc(x, y, r - i * 4, 0, 7); ctx.fill(); } ctx.fillStyle = "#0c0c12"; ctx.beginPath(); ctx.arc(x, y, 6, 0, 7); ctx.fill(); }

function drawLimb(x, y, dx, dy, col, r) { ctx.strokeStyle = col; ctx.lineWidth = r * 1.5; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + dx, y + dy); ctx.stroke(); ctx.fillStyle = col; ctx.beginPath(); ctx.arc(x + dx, y + dy, r, 0, 7); ctx.fill(); }
function drawTaco(x, y, size, lvl) {
  const L = lvl || 1;
  const grow = 1 + Math.min(L - 1, 10) * 0.05;        // crece con el nivel
  const stage = Math.min(Math.floor((L - 1) / 3), 3); // evolucion 0..3 (corona/aura)
  const s = size * grow, w = s, h = s * 0.62;
  const wlk = Math.sin(walkPhase), sw = playerMoving ? wlk : 0;
  const bob = playerMoving ? Math.abs(wlk) * s * 0.05 : Math.sin(t * 3) * s * 0.025;
  ctx.save(); ctx.translate(x, y + bob);
  // aura de evolucion
  if (stage >= 2) { ctx.globalAlpha = 0.12 + 0.08 * Math.sin(t * 5); ctx.fillStyle = stage >= 3 ? "#ffd84a" : "#b48cff"; ctx.beginPath(); ctx.arc(0, 0, s, 0, 7); ctx.fill(); ctx.globalAlpha = 1; }
  // sombra
  ctx.fillStyle = "rgba(0,0,0,0.28)"; ctx.beginPath(); ctx.ellipse(0, s * 0.52, s * 0.34, s * 0.11, 0, 0, 7); ctx.fill();
  // piernas + pies (caminata alternada)
  drawLimb(-s * 0.15, s * 0.16, -s * 0.02, s * 0.34 + sw * s * 0.14, "#d89a3a", s * 0.095);
  drawLimb(s * 0.15, s * 0.16, s * 0.02, s * 0.34 - sw * s * 0.14, "#d89a3a", s * 0.095);
  // brazos + manos (oscilan opuesto)
  drawLimb(-s * 0.36, -s * 0.06, -s * 0.12, s * 0.18 - sw * s * 0.12, "#f0c255", s * 0.085);
  drawLimb(s * 0.36, -s * 0.06, s * 0.12, s * 0.18 + sw * s * 0.12, "#f0c255", s * 0.085);
  // escudo
  if (pShield > 0) { let a = 0.3 + 0.22 * Math.sin(t * 8); if (pShield < 1.5) a *= 0.4 + 0.6 * Math.abs(Math.sin(t * 20)); ctx.globalAlpha = a; ctx.fillStyle = "#5eead4"; ctx.beginPath(); ctx.arc(0, 0, w * 0.9, 0, 7); ctx.fill(); ctx.globalAlpha = 1; }
  // cuerpo: tortilla con relleno
  ctx.fillStyle = "#f5b938"; ctx.beginPath(); ctx.arc(0, -h * 0.1, w * 0.5, 0, Math.PI, false); ctx.fill();
  ctx.fillStyle = "#d08a26"; ctx.beginPath(); ctx.arc(0, -h * 0.1, w * 0.5, 0.15, Math.PI - 0.15, false); ctx.arc(0, -h * 0.1, w * 0.42, Math.PI - 0.15, 0.15, true); ctx.fill();
  ctx.fillStyle = "#e2342a"; ctx.beginPath(); ctx.arc(0, -h * 0.1, w * 0.36, Math.PI + 0.2, -0.2, false); ctx.fill();
  ctx.fillStyle = "#ffd650"; ctx.beginPath(); ctx.arc(-w * 0.12, -h * 0.18, w * 0.13, 0, 7); ctx.fill();
  ctx.fillStyle = "#60d040"; for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.arc(i * w * 0.16, -h * 0.34, w * 0.11, Math.PI, 0, false); ctx.fill(); }
  // ojos
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(-w * 0.12, -h * 0.04, w * 0.075, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(w * 0.12, -h * 0.04, w * 0.075, 0, 7); ctx.fill();
  ctx.fillStyle = "#2a1808"; ctx.beginPath(); ctx.arc(-w * 0.10, -h * 0.03, w * 0.038, 0, 7); ctx.fill(); ctx.beginPath(); ctx.arc(w * 0.14, -h * 0.03, w * 0.038, 0, 7); ctx.fill();
  // boca animada (habla/camina)
  const mo = (0.5 + 0.5 * Math.sin(t * 6)) * (playerMoving ? 1 : 0.45);
  ctx.fillStyle = "#3a1810"; ctx.beginPath(); ctx.ellipse(0, h * 0.07, w * 0.12, w * (0.035 + 0.06 * mo), 0, 0, 7); ctx.fill();
  ctx.fillStyle = "#ff7a8a"; ctx.beginPath(); ctx.ellipse(0, h * 0.09, w * 0.06, w * (0.015 + 0.03 * mo), 0, 0, 7); ctx.fill();
  // corona de evolucion
  if (stage >= 1) {
    ctx.fillStyle = stage >= 3 ? "#ffd84a" : stage >= 2 ? "#e6c0ff" : "#cfd3e0";
    const cy = -h * 0.46 - s * 0.16, cw = s * 0.32;
    ctx.beginPath(); ctx.moveTo(-cw, cy + s * 0.13); ctx.lineTo(-cw, cy); ctx.lineTo(-cw * 0.5, cy + s * 0.07); ctx.lineTo(0, cy - s * 0.05); ctx.lineTo(cw * 0.5, cy + s * 0.07); ctx.lineTo(cw, cy); ctx.lineTo(cw, cy + s * 0.13); ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function bar(x, y, w, h, ratio, col) { ctx.fillStyle = "rgba(8,10,16,0.9)"; ctx.fillRect(x - 2, y - 2, w + 4, h + 4); ctx.fillStyle = "#222630"; ctx.fillRect(x, y, w, h); ctx.fillStyle = col; ctx.fillRect(x, y, w * clamp(ratio, 0, 1), h); }
function drawStick(s, col) { if (s.id === null) return; ctx.strokeStyle = "rgba(255,255,255,0.16)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(s.bx, s.by, 56, 0, 7); ctx.stroke(); const dx = s.x - s.bx, dy = s.y - s.by, d = len(dx, dy), m = Math.min(d, 56); const kx = d > 0 ? s.bx + dx / d * m : s.bx, ky = d > 0 ? s.by + dy / d * m : s.by; ctx.fillStyle = col; ctx.beginPath(); ctx.arc(kx, ky, 26, 0, 7); ctx.fill(); }
function text(s, x, y, size, col, align) { ctx.fillStyle = col; ctx.font = "700 " + size + "px -apple-system, Segoe UI, sans-serif"; ctx.textAlign = align || "left"; ctx.textBaseline = "alphabetic"; ctx.fillText(s, x, y); }
function fitFont(s, maxW, base) { let fs = base; ctx.font = "700 " + fs + "px -apple-system,Segoe UI,sans-serif"; while (ctx.measureText(s).width > maxW && fs > 10) { fs--; ctx.font = "700 " + fs + "px -apple-system,Segoe UI,sans-serif"; } return fs; }
function fitText(s, x, y, maxW, base, col) { text(s, x, y, fitFont(s, maxW, base), col, "center"); }
function fitTextLeft(s, x, y, maxW, base, col) { text(s, x, y, fitFont(s, maxW, base), col, "left"); }

function drawButtons() {
  for (const b of buttons()) {
    ctx.fillStyle = "rgba(28,30,42,0.9)"; ctx.strokeStyle = "rgba(120,120,150,0.6)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(b.x, b.y, b.w, b.h, 9); ctx.fill(); ctx.stroke();
    let lbl = "", col = "#dfe2ea";
    if (b.id === "mute") { lbl = mute ? "MUTE" : "SON"; col = mute ? "#888" : "#dfe2ea"; }
    else if (b.id === "pause") { lbl = paused ? ">" : "II"; }
    else if (b.id === "weapon") { lbl = WEAPONS[weapon].name; col = "#ffb060"; }
    else { lbl = lang; col = lang === "ZH" ? "#f08cbe" : "#7fd6ff"; }
    const fs = fitFont(lbl, b.w - 8, b.id === "pause" ? 18 : 13);
    text(lbl, b.x + b.w / 2, b.y + b.h / 2 + fs * 0.36, fs, col, "center");
  }
}

function drawHUD() {
  const tp = safeT, bt = safeB, lf = 16 + Math.max(0, safeT > 0 ? 0 : 0);
  text(score, W / 2, 40 + tp, 30, "#fff", "center");
  text("RECORD " + best, W / 2, 60 + tp, 13, "#9a9ab0", "center");
  if (combo >= 2) text("COMBO x" + (1 + Math.min(Math.floor(combo / 3), 4)) + "  (" + combo + ")", W / 2, 84 + tp, 17, "#ff9b3c", "center");
  text("DIM " + level + "  " + theme.name + "   ·   ING " + words, 16, 26 + tp, 14, "#7fd6ff", "left");
  bar(16, 36 + tp, 180, 14, player.hp / MAXHP, player.hp > 50 ? "#eb5046" : player.hp > 25 ? "#f0aa3c" : "#dc322d");
  let cx = 16;
  [[0, pShield, 7], [1, pTriple, 9], [2, pRapid, 9]].forEach(([k, v, mx]) => { if (v > 0) { const w = 78; bar(cx, 60 + tp, w, 16, v / mx, powerCol(k)); text(powerName(k), cx + 4, 73 + tp, 11, "#0c0c12", "left"); cx += w + 8; } });
  const boss = enemies.find(e => e.boss);
  if (boss) { const w = Math.min(420, W - 120); text("JEFE", W / 2, H - 62 - bt, 16, "#ce82ff", "center"); bar(W / 2 - w / 2, H - 52 - bt, w, 14, boss.hp / boss.maxhp, "#ce50aa"); }
  if (portal) text("PORTAL ABIERTO - ANDA AL REMOLINO", W / 2, H - 26 - bt, 13, "#b480ff", "center");
}

// Panel del quiz (portal de idiomas) - ELITE
function quizPanelRect() { const w = Math.min(580, W - 32), h = Math.min(400, H - 64); return { x: (W - w) / 2, y: (H - h) / 2, w, h }; }
function quizOptRect(i) { const p = quizPanelRect(); const w = p.w - 52, h = 50, gap = 11; return { x: p.x + 26, y: p.y + 146 + i * (h + gap), w, h }; }
function quizOptAt(px, py) { if (state !== "quiz" || !quiz || quiz.sel >= 0) return -1; for (let i = 0; i < quiz.options.length; i++) { const r = quizOptRect(i); if (px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h) return i; } return -1; }
function drawQuiz() {
  const L = quiz.L, lv = L.levels[langTierIdx(L)], zh = L.code === "zh-CN";
  const acc = zh ? "#e85d9a" : "#b480ff", accL = zh ? "#f29ac6" : "#cba6ff";
  const anim = clamp((t - quiz.t0) / 0.22, 0, 1), ease = 1 - (1 - anim) * (1 - anim);
  ctx.fillStyle = "rgba(4,4,10," + (0.66 * ease) + ")"; ctx.fillRect(0, 0, W, H);
  const p = quizPanelRect();
  ctx.save();
  ctx.translate(p.x + p.w / 2, p.y + p.h / 2); const sc = 0.86 + 0.14 * ease; ctx.scale(sc, sc); ctx.globalAlpha = ease; ctx.translate(-(p.x + p.w / 2), -(p.y + p.h / 2));
  const glow = 0.5 + 0.5 * Math.sin(t * 4);
  ctx.shadowColor = acc; ctx.shadowBlur = 16 + 12 * glow;
  ctx.fillStyle = "#161826"; ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 16); ctx.fill();
  ctx.shadowBlur = 0; ctx.strokeStyle = acc; ctx.lineWidth = 3; ctx.stroke();
  text("PORTAL  ·  " + L.name + "  ·  " + lv.tag, W / 2, p.y + 36, 16, accL, "center");
  text("Traduce al " + (zh ? "CHINO (caracteres + pinyin)" : "INGLES") + ":", W / 2, p.y + 70, 13, "#9a9ab0", "center");
  fitText(quiz.prompt, W / 2, p.y + 110, p.w - 56, 27, "#fff");
  const st = Math.min((lstats[quiz.key] || {}).streak || 0, 3);
  text((st >= 1 ? "●" : "○") + "  " + (st >= 2 ? "●" : "○") + "  " + (st >= 3 ? "●" : "○") + (st >= 3 ? "  DOMINADA" : ""), W / 2, p.y + 132, 12, st >= 3 ? "#60d050" : accL, "center");
  for (let i = 0; i < quiz.options.length; i++) {
    const r = quizOptRect(i); let bg = "#262a3c", bc = "#3a3f55", al = ease;
    if (quiz.sel >= 0) {
      if (i === quiz.correct) { const g2 = 0.55 + 0.45 * Math.sin(t * 12); bg = "rgba(40,150,55," + g2 + ")"; bc = "#62e074"; }
      else if (i === quiz.sel) { bg = "#6e2730"; bc = "#d05858"; }
      else al = ease * 0.45;
    }
    ctx.globalAlpha = al;
    ctx.fillStyle = bg; ctx.beginPath(); ctx.roundRect(r.x, r.y, r.w, r.h, 11); ctx.fill();
    ctx.strokeStyle = bc; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = "rgba(255,255,255,0.10)"; ctx.beginPath(); ctx.roundRect(r.x + 8, r.y + 9, 30, r.h - 18, 7); ctx.fill();
    text("" + (i + 1), r.x + 23, r.y + r.h / 2 + 6, 17, "#cfd3e0", "center");
    fitTextLeft(quiz.options[i], r.x + 48, r.y + r.h / 2 + 6, r.w - 64, 20, "#fff");
    ctx.globalAlpha = ease;
  }
  const md = masteredTotalL(L), bx = p.x + 28, bw = p.w - 56, by = p.y + p.h - 48;
  ctx.fillStyle = "#222630"; ctx.beginPath(); ctx.roundRect(bx, by, bw, 8, 4); ctx.fill();
  ctx.fillStyle = "#60d050"; ctx.beginPath(); ctx.roundRect(bx, by, bw * (md[0] / Math.max(1, md[1])), 8, 4); ctx.fill();
  text("Dominadas " + md[0] + "/" + md[1] + "   ·   boton " + lang + " cambia idioma", W / 2, p.y + p.h - 30, 12, "#8a8aa0", "center");
  if (quiz.sel >= 0) text(quiz.sel === quiz.correct ? "CORRECTO!  +80  (escucha)" : "Era:  " + quiz.options[quiz.correct], W / 2, p.y + p.h - 12, 16, quiz.sel === quiz.correct ? "#60d050" : "#eb6050", "center");
  ctx.restore();
}

function render() {
  ctx.save();
  if (shake > 0) ctx.translate(rand(-shake, shake), rand(-shake, shake));
  drawDungeon();
  for (const g of gems) drawGem(g.x, g.y);
  for (const h of heals) drawHeal(h.x, h.y);
  for (const pd of powerDrops) drawPower(pd.x, pd.y, pd.kind);
  if (portal) drawPortal(portal.x, portal.y);
  for (const b of bullets) { ctx.fillStyle = "#ff8c32"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill(); ctx.fillStyle = "#ffe896"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.5, 0, 7); ctx.fill(); }
  for (const s of eshots) { ctx.fillStyle = "#78d2eb"; ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, 7); ctx.fill(); ctx.fillStyle = "#dff4ff"; ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, 7); ctx.fill(); }
  for (const e of enemies) { drawBlock(ctx, e.x - e.r, e.y - e.r, e.r * 2, e.flash > 0 ? "#ffffff" : e.col); if (e.hp < e.maxhp && !e.boss) bar(e.x - e.r, e.y - e.r - 8, e.r * 2, 4, e.hp / e.maxhp, "#60d050"); }
  if (!(player.inv > 0 && Math.floor(t * 20) % 2)) drawTaco(player.x, player.y, player.r * 2.2, level);
  for (const p of parts) { ctx.globalAlpha = clamp(p.life / p.max, 0, 1); ctx.fillStyle = p.col; ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r); }
  for (const f of floaters) { ctx.globalAlpha = clamp(f.life, 0, 1); text(f.txt, f.x, f.y, 17, f.col, "center"); }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Viñeta + destello (4D)
  const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.32, W / 2, H / 2, Math.max(W, H) * 0.72);
  vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(0,0,0,0.42)");
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  if (flashT > 0) { ctx.fillStyle = "rgba(" + flashCol + "," + (0.4 * flashT / flashMax) + ")"; ctx.fillRect(0, 0, W, H); }

  if (state === "play" || state === "quiz") { drawHUD(); }
  if (state === "play") { drawStick(stickL, "rgba(94,234,212,0.5)"); drawStick(stickR, "rgba(255,150,60,0.6)"); drawButtons(); }
  if (state === "quiz") drawQuiz();
  if (paused && state === "play") { ctx.fillStyle = "rgba(6,6,12,0.6)"; ctx.fillRect(0, 0, W, H); text("PAUSA", W / 2, H / 2, 48, "#f5cd46", "center"); text("toca II para seguir", W / 2, H / 2 + 40, 16, "#9a9ab0", "center"); drawButtons(); }
  if (state === "title") {
    ctx.fillStyle = "rgba(8,8,16,0.62)"; ctx.fillRect(0, 0, W, H);
    drawTaco(W / 2, H / 2 - 140, Math.min(70, W / 6), 7); // taco evolucionado de muestra
    text("CATACOMB", W / 2, H / 2 - 50, Math.min(72, W / 7), "#f5cd46", "center");
    text("el taco en la catacumba", W / 2, H / 2 - 8, 18, "#96c8eb", "center");
    text("TOCA PARA JUGAR", W / 2, H / 2 + 52, 22, "#f5cd46", "center");
    text("izq: mover   der: apuntar y disparar", W / 2, H / 2 + 88, 14, "#8a8aa0", "center");
    text("viaja por DIMENSIONES, crece y aprende INGLES y CHINO (frases)", W / 2, H / 2 + 112, 13, "#7a7a90", "center");
    text("build " + VERSION, W / 2, H - 14 - safeB, 11, "#586", "center");
  }
  if (state === "over") {
    ctx.fillStyle = "rgba(6,6,12,0.8)"; ctx.fillRect(0, 0, W, H);
    text("GAME OVER", W / 2, H / 2 - 30, Math.min(64, W / 8), "#eb5040", "center");
    let mAll = 0, tAll = 0; for (const lk of LANGS) { const md = masteredTotalL(LESSONS[lk]); mAll += md[0]; tAll += md[1]; }
    text("PUNTAJE  " + score, W / 2, H / 2 + 22, 26, "#fff", "center");
    text("APRENDIDAS " + words + "    DOMINADAS " + mAll + "/" + tAll + " (EN+ZH)", W / 2, H / 2 + 52, 15, "#60d050", "center");
    text("RECORD  " + best, W / 2, H / 2 + 76, 15, "#9a9ab0", "center");
    text("TOCA PARA REINTENTAR", W / 2, H / 2 + 110, 20, "#f5cd46", "center");
  }
}

// roundRect fallback (navegadores viejos)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) { this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath(); return this; };
}

let last = performance.now();
function frame(now) { let dt = (now - last) / 1000; last = now; if (dt > 0.05) dt = 0.05; update(dt); render(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);
</script>
