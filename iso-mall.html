<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MALL · ISO 3D v2</title>
<style>
  :root{
    --pink:#ff6b8a; --cyan:#7fd6ff; --gold:#ffd84a; --taco:#f5cd46;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:#cfe6f2;}
  body{
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    touch-action:none; -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }
  #cv{display:block;position:fixed;inset:0;}
  /* ---- Overlay top ---- */
  #hud{
    position:fixed; left:0; right:0;
    top:env(safe-area-inset-top,0);
    padding:10px 14px;
    pointer-events:none; z-index:10;
    display:flex; flex-direction:column; gap:4px;
  }
  #title{
    font-weight:800; font-size:clamp(15px,3.6vw,22px); letter-spacing:.5px;
    display:inline-block; width:max-content;
    background:linear-gradient(90deg,#ff6b8a,#ffd84a 55%,#7fd6ff);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 2px #0003);
  }
  #help{
    font-size:clamp(11px,2.6vw,13px); font-weight:600;
    color:#234; background:#ffffffb0; backdrop-filter:blur(4px);
    border-radius:10px; padding:5px 10px; width:max-content; max-width:92vw;
    box-shadow:0 2px 8px #0002;
  }
  /* ---- D-Pad (touch only) ---- */
  #pad{
    position:fixed; z-index:20;
    left:env(safe-area-inset-left,0); bottom:env(safe-area-inset-bottom,0);
    margin:0 0 22px 18px;
    width:168px; height:168px; display:none;
    touch-action:none;
  }
  .pad-btn{
    position:absolute; width:54px; height:54px;
    background:#ffffffcc; border:2px solid #ffffff;
    border-radius:14px; box-shadow:0 4px 10px #0003;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; color:#33506b; font-weight:900;
  }
  .pad-btn:active{background:#ffd84a; transform:scale(.94);}
  #pUp{left:57px; top:0;} #pDown{left:57px; bottom:0;}
  #pLeft{left:0; top:57px;} #pRight{right:0; top:57px;}
  body.touch #pad{display:block;}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="hud">
  <span id="title">MALL · ISO 3D v2 (experimento)</span>
  <span id="help">WASD / Flechas para mover el TACO · D-Pad en táctil</span>
</div>

<div id="pad">
  <div class="pad-btn" id="pUp">▲</div>
  <div class="pad-btn" id="pDown">▼</div>
  <div class="pad-btn" id="pLeft">◀</div>
  <div class="pad-btn" id="pRight">▶</div>
</div>

<script>
'use strict';
(function(){
  /* =========================================================
     MALL · ISO 3D v2  — Canvas 2D isometrico, un solo archivo
     ========================================================= */

  const cv  = document.getElementById('cv');
  const ctx = cv.getContext('2d');

  // ---- Iso constants ----
  const tileW = 64, tileH = 32;          // diamond 2:1
  const MAP_W = 12, MAP_H = 8;           // floor grid (tiles)

  // Projection: tx,ty in tile units, tz in pixels of height.
  function worldToScreen(tx, ty, tz){
    return {
      x: (tx - ty) * (tileW / 2),
      y: (tx + ty) * (tileH / 2) - (tz || 0)
    };
  }

  // ---- Camera / DPR ----
  let DPR = 1, VW = 0, VH = 0;
  let camX = 0, camY = 0;                // screen-space camera offset (centre of mall)

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    VW = window.innerWidth;
    VH = window.innerHeight;
    cv.width  = Math.round(VW * DPR);
    cv.height = Math.round(VH * DPR);
    cv.style.width  = VW + 'px';
    cv.style.height = VH + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    // centre of floor in world tiles:
    const c = worldToScreen(MAP_W / 2, MAP_H / 2, 0);
    camX = VW / 2 - c.x;
    camY = VH / 2 - c.y + 30;            // nudge down so mall sits nicely
  }
  window.addEventListener('resize', resize, {passive:true});

  // helper: project a world point to final canvas pixels (camera applied)
  function P(tx, ty, tz){
    const s = worldToScreen(tx, ty, tz);
    return { x: s.x + camX, y: s.y + camY };
  }

  // ---- Color utils ----
  function shade(hex, f){
    // f>1 lighten, f<1 darken
    const n = parseInt(hex.slice(1), 16);
    let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    r = Math.max(0, Math.min(255, Math.round(r * f)));
    g = Math.max(0, Math.min(255, Math.round(g * f)));
    b = Math.max(0, Math.min(255, Math.round(b * f)));
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  function roundRect(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,   x+w,y+h, r);
    ctx.arcTo(x+w,y+h, x,  y+h, r);
    ctx.arcTo(x,  y+h, x,  y,   r);
    ctx.arcTo(x,  y,   x+w,y,   r);
    ctx.closePath();
  }

  function lerp(a,b,t){ return { x:a.x+(b.x-a.x)*t, y:a.y+(b.y-a.y)*t }; }

  /* =========================================================
     FLOOR
     ========================================================= */
  function drawFloor(){
    for (let ty = 0; ty < MAP_H; ty++){
      for (let tx = 0; tx < MAP_W; tx++){
        const a = P(tx,   ty,   0);   // top
        const b = P(tx+1, ty,   0);   // right
        const c = P(tx+1, ty+1, 0);   // bottom
        const d = P(tx,   ty+1, 0);   // left
        const light = ((tx + ty) % 2 === 0);
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.lineTo(c.x, c.y);
        ctx.lineTo(d.x, d.y);
        ctx.closePath();
        // subtle vertical gradient sheen on each tile
        const g = ctx.createLinearGradient(a.x, a.y, c.x, c.y);
        if (light){ g.addColorStop(0,'#f3eee4'); g.addColorStop(1,'#e2dccd'); }
        else       { g.addColorStop(0,'#e7e1d4'); g.addColorStop(1,'#d4ccbb'); }
        ctx.fillStyle = g;
        ctx.fill();
        // sutile junta
        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(120,110,90,.22)';
        ctx.stroke();
      }
    }
    // glossy highlight band (skylight reflection on floor)
    const t = P(MAP_W*0.30, MAP_H*0.30, 0);
    const r = P(MAP_W*0.85, MAP_H*0.85, 0);
    const gloss = ctx.createLinearGradient(t.x, t.y, r.x, r.y);
    gloss.addColorStop(0,'rgba(255,255,255,.0)');
    gloss.addColorStop(.5,'rgba(255,255,255,.22)');
    gloss.addColorStop(1,'rgba(255,255,255,.0)');
    ctx.save();
    const a = P(0,0,0), b = P(MAP_W,0,0), c = P(MAP_W,MAP_H,0), d = P(0,MAP_H,0);
    ctx.beginPath();
    ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.lineTo(c.x,c.y); ctx.lineTo(d.x,d.y);
    ctx.closePath(); ctx.clip();
    ctx.fillStyle = gloss; ctx.fillRect(0,0,VW,VH);
    ctx.restore();
  }

  /* =========================================================
     ISO BOX primitive (3 faces) at tile footprint
     base at (tx,ty) spanning (w,d) tiles, height h px
     ========================================================= */
  function isoBox(tx, ty, w, d, h, topCol, frontCol, sideCol){
    // 4 base corners
    const bN = P(tx,     ty,     0);  // back/top corner
    const bE = P(tx+w,   ty,     0);  // right
    const bS = P(tx+w,   ty+d,   0);  // front/bottom
    const bW = P(tx,     ty+d,   0);  // left
    // top corners (raised)
    const tN = P(tx,     ty,     h);
    const tE = P(tx+w,   ty,     h);
    const tS = P(tx+w,   ty+d,   h);
    const tW = P(tx,     ty+d,   h);

    // LEFT face (W-S) -> the visible side wall (medium)
    ctx.beginPath();
    ctx.moveTo(bW.x,bW.y); ctx.lineTo(bS.x,bS.y); ctx.lineTo(tS.x,tS.y); ctx.lineTo(tW.x,tW.y);
    ctx.closePath(); ctx.fillStyle = sideCol; ctx.fill();

    // RIGHT face (S-E) -> front (light)  [facing camera-ish]
    ctx.beginPath();
    ctx.moveTo(bS.x,bS.y); ctx.lineTo(bE.x,bE.y); ctx.lineTo(tE.x,tE.y); ctx.lineTo(tS.x,tS.y);
    ctx.closePath(); ctx.fillStyle = frontCol; ctx.fill();

    // TOP face
    ctx.beginPath();
    ctx.moveTo(tN.x,tN.y); ctx.lineTo(tE.x,tE.y); ctx.lineTo(tS.x,tS.y); ctx.lineTo(tW.x,tW.y);
    ctx.closePath(); ctx.fillStyle = topCol; ctx.fill();

    return { bN,bE,bS,bW, tN,tE,tS,tW };
  }

  /* =========================================================
     STORES along the north wall (back row)
     ========================================================= */
  const STORES = [
    { name:'MODA',     awn:'#ff6b8a', tx:0.2 },
    { name:'ARCADE',   awn:'#7fd6ff', tx:2.2 },
    { name:'CAFE',     awn:'#c98a4b', tx:4.2 },
    { name:'JUGUETES', awn:'#ffd84a', tx:6.2 },
    { name:'TECH',     awn:'#9b8cff', tx:8.2 },
    { name:'HELADOS',  awn:'#7be0b0', tx:10.2 }
  ];
  const STORE_W = 1.8, STORE_D = 0.9, STORE_H = 150;

  function drawStore(s){
    const tx = s.tx, ty = -STORE_D;   // sit just behind the floor's north edge
    // store body box
    isoBox(tx, ty, STORE_W, STORE_D, STORE_H,
           '#fbf7ef', shade('#e9e2d4',1.02), shade('#cdc4b2',1.0));

    // --- glass storefront (on the front/right face) glowing ---
    const f0  = P(tx+STORE_W, ty+STORE_D, 0);
    const f1  = P(tx,         ty+STORE_D, 0);
    const f0t = P(tx+STORE_W, ty+STORE_D, STORE_H*0.62);
    const f1t = P(tx,         ty+STORE_D, STORE_H*0.62);
    const g0  = lerp(f1,f0,0.10),  g1  = lerp(f1,f0,0.90);
    const g0t = lerp(f1t,f0t,0.10),g1t = lerp(f1t,f0t,0.90);
    const top0 = lerp(g0,g0t,0.12), top1 = lerp(g1,g1t,0.12);
    ctx.beginPath();
    ctx.moveTo(top0.x, top0.y);
    ctx.lineTo(top1.x, top1.y);
    ctx.lineTo(g1t.x,  g1t.y);
    ctx.lineTo(g0t.x,  g0t.y);
    ctx.closePath();
    const gg = ctx.createLinearGradient(top0.x, top0.y, g0t.x, g0t.y);
    gg.addColorStop(0, '#fff7d6');
    gg.addColorStop(.5,'#ffe9a8');
    gg.addColorStop(1, '#bfe9ff');
    ctx.fillStyle = gg; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,.7)'; ctx.lineWidth=1.5; ctx.stroke();

    // --- striped awning (toldo) over the glass ---
    const ay = STORE_H*0.66;
    const at0 = P(tx+STORE_W*0.04, ty+STORE_D,      ay);
    const at1 = P(tx+STORE_W*0.96, ty+STORE_D,      ay);
    const af0 = P(tx+STORE_W*0.04, ty+STORE_D+0.55, ay-14);
    const af1 = P(tx+STORE_W*0.96, ty+STORE_D+0.55, ay-14);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(at0.x,at0.y); ctx.lineTo(at1.x,at1.y);
    ctx.lineTo(af1.x,af1.y); ctx.lineTo(af0.x,af0.y); ctx.closePath();
    ctx.clip();
    const STRIPES = 8;
    for (let i=0;i<STRIPES;i++){
      const t0=i/STRIPES, t1=(i+1)/STRIPES;
      const p0=lerp(at0,at1,t0), p1=lerp(at0,at1,t1);
      const q0=lerp(af0,af1,t0), q1=lerp(af0,af1,t1);
      ctx.beginPath();
      ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y);
      ctx.lineTo(q1.x,q1.y); ctx.lineTo(q0.x,q0.y); ctx.closePath();
      ctx.fillStyle = (i%2===0)? s.awn : '#fff';
      ctx.fill();
    }
    ctx.restore();
    // front edge of awning
    ctx.beginPath();
    ctx.moveTo(af0.x,af0.y); ctx.lineTo(af1.x,af1.y);
    ctx.lineWidth=3; ctx.strokeStyle=shade(s.awn,0.8); ctx.stroke();

    // --- sign with store name ---
    const sg = P(tx+STORE_W/2, ty+STORE_D, STORE_H*0.86);
    const sw = STORE_W*tileW*0.92, sh = 24;
    ctx.save();
    ctx.translate(sg.x, sg.y);
    roundRect(-sw/2, -sh/2, sw, sh, 6);
    ctx.fillStyle = '#2a3550'; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle = s.awn; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = '700 ' + Math.max(11, Math.min(16, sw/ s.name.length*1.5)) + 'px system-ui';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(s.name, 0, 1);
    ctx.restore();
  }

  /* =========================================================
     KIOSKS — iso boxes with icon + sign
     ========================================================= */
  const KIOSKS = [
    { kind:'health', tx:2.5,  ty:3.0, col:'#7be0b0', label:'SALUD'   },
    { kind:'power',  tx:5.5,  ty:5.4, col:'#7fd6ff', label:'PODERES' },
    { kind:'food',   tx:8.6,  ty:2.6, col:'#ff6b8a', label:'COMIDA'  }
  ];
  const K_W = 1.0, K_D = 1.0, K_H = 70;

  function drawKiosk(k){
    isoBox(k.tx, k.ty, K_W, K_D, K_H,
           shade(k.col,1.18), shade(k.col,0.92), shade(k.col,0.72));
    // top icon panel
    const top = P(k.tx+K_W/2, k.ty+K_D/2, K_H);
    ctx.save();
    ctx.translate(top.x, top.y);
    // white roof disc
    ctx.beginPath(); ctx.ellipse(0,-2,26,14,0,0,Math.PI*2);
    ctx.fillStyle='#ffffff'; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=shade(k.col,0.7); ctx.stroke();
    // icon
    ctx.translate(0,-3);
    if (k.kind==='health'){
      ctx.fillStyle='#1f9d6b';
      ctx.fillRect(-4,-11,8,22); ctx.fillRect(-11,-4,22,8);
    } else if (k.kind==='power'){
      ctx.fillStyle='#2e9ad6';
      ctx.beginPath();
      ctx.moveTo(0,-12); ctx.lineTo(11,-6); ctx.lineTo(9,8);
      ctx.lineTo(0,13); ctx.lineTo(-9,8); ctx.lineTo(-11,-6); ctx.closePath();
      ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='900 13px system-ui';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('★',0,1);
    } else {
      // burger
      ctx.fillStyle='#d9a441';
      ctx.beginPath(); ctx.ellipse(0,-6,12,7,0,Math.PI,0); ctx.fill();
      ctx.fillStyle='#6fbf73'; ctx.fillRect(-12,-1,24,3);
      ctx.fillStyle='#a8522a'; ctx.fillRect(-11,2,22,4);
      ctx.fillStyle='#e2b85a';
      ctx.beginPath(); ctx.ellipse(0,8,12,5,0,0,Math.PI); ctx.fill();
    }
    ctx.restore();
    // sign
    const sg = P(k.tx+K_W/2, k.ty+K_D/2, K_H+34);
    ctx.save(); ctx.translate(sg.x,sg.y);
    const w = k.label.length*9+18;
    roundRect(-w/2,-11,w,22,6); ctx.fillStyle='#2a3550'; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=k.col; ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font='700 13px system-ui';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(k.label,0,1);
    ctx.restore();
  }

  /* =========================================================
     ESCALATOR — big diagonal in the centre with moving steps
     ========================================================= */
  const ESC = {
    tx0: 4.2, ty0: 6.6,   // bottom (front, near camera)
    tx1: 6.2, ty1: 4.6,   // top (back), goes up & away
    z0: 0,    z1: 96,
    w: 1.0                 // width in tiles (perpendicular)
  };
  let escPhase = 0;

  function escPoint(t, side, z){
    // t in [0..1] along ramp; side -0.5..0.5 across width
    const tx = ESC.tx0 + (ESC.tx1-ESC.tx0)*t;
    const ty = ESC.ty0 + (ESC.ty1-ESC.ty0)*t;
    const dx = (ESC.tx1-ESC.tx0), dy = (ESC.ty1-ESC.ty0);
    const len = Math.hypot(dx,dy);
    const px = -dy/len, py = dx/len;   // perpendicular in tile space
    return P(tx + px*ESC.w*side, ty + py*ESC.w*side, z);
  }

  function drawEscalator(){
    const z0=ESC.z0, z1=ESC.z1;
    // shadow on floor under ramp
    const s0=escPoint(0,-0.6,0), s1=escPoint(0,0.6,0),
          s2=escPoint(1,0.6,0),  s3=escPoint(1,-0.6,0);
    ctx.beginPath();
    ctx.moveTo(s0.x,s0.y);ctx.lineTo(s1.x,s1.y);ctx.lineTo(s2.x,s2.y);ctx.lineTo(s3.x,s3.y);
    ctx.closePath(); ctx.fillStyle='rgba(40,40,60,.16)'; ctx.fill();

    function panel(side, col){
      const a=escPoint(0,side,z0), b=escPoint(1,side,z1);
      const aT=escPoint(0,side,z0+34), bT=escPoint(1,side,z1+34);
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(bT.x,bT.y);ctx.lineTo(aT.x,aT.y);
      ctx.closePath(); ctx.fillStyle=col; ctx.fill();
      ctx.lineWidth=1.5; ctx.strokeStyle='rgba(0,0,0,.18)'; ctx.stroke();
    }
    panel(-0.5,'#9fb4c4');   // far side (darker)

    // deck (sloped band where steps live)
    const d0=escPoint(0,-0.5,z0), d1=escPoint(0,0.5,z0),
          d2=escPoint(1,0.5,z1), d3=escPoint(1,-0.5,z1);
    ctx.beginPath();
    ctx.moveTo(d0.x,d0.y);ctx.lineTo(d1.x,d1.y);ctx.lineTo(d2.x,d2.y);ctx.lineTo(d3.x,d3.y);
    ctx.closePath(); ctx.fillStyle='#c4cfd8'; ctx.fill();

    // moving steps (huella + contrahuella)
    const N = 9;
    for (let i=0;i<N;i++){
      let t = (i/N + escPhase) % 1;       // loop upward
      const tNext = Math.min(1, t + (1/N)*0.78);
      const zT = z0 + (z1-z0)*t;
      const zN = z0 + (z1-z0)*tNext;
      // tread (top)
      const a=escPoint(t,-0.46,zT+8), b=escPoint(t,0.46,zT+8);
      const c=escPoint(tNext,0.46,zN+8), e=escPoint(tNext,-0.46,zN+8);
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(c.x,c.y);ctx.lineTo(e.x,e.y);
      ctx.closePath(); ctx.fillStyle='#eef3f7'; ctx.fill();
      ctx.lineWidth=1; ctx.strokeStyle='#9fb0bd'; ctx.stroke();
      // riser (front vertical face)
      const af=escPoint(t,-0.46,zT-2), bf=escPoint(t,0.46,zT-2);
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(bf.x,bf.y);ctx.lineTo(af.x,af.y);
      ctx.closePath(); ctx.fillStyle='#b9c6d1'; ctx.fill();
    }

    panel(0.5,'#c8d6e0');    // near side (lighter, over steps edge)

    // handrails (two)
    function rail(side){
      const a=escPoint(0,side,z0+40), b=escPoint(1,side,z1+40);
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
      ctx.lineWidth=7; ctx.lineCap='round'; ctx.strokeStyle='#445166'; ctx.stroke();
      ctx.lineWidth=3; ctx.strokeStyle='#7fd6ff'; ctx.stroke();
    }
    rail(-0.5); rail(0.5);

    // pulsing UP arrow above top
    const top = escPoint(1, 0, z1+58);
    const pulse = 0.6 + 0.4*Math.sin(performance.now()/300);
    ctx.save(); ctx.translate(top.x, top.y);
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#2bd47a';
    ctx.beginPath();
    ctx.moveTo(0,-16); ctx.lineTo(13,6); ctx.lineTo(5,6);
    ctx.lineTo(5,18); ctx.lineTo(-5,18); ctx.lineTo(-5,6); ctx.lineTo(-13,6);
    ctx.closePath(); ctx.fill();
    ctx.globalAlpha=1;
    ctx.restore();
  }

  /* =========================================================
     PLANTS & BENCHES
     ========================================================= */
  const PLANTS = [ {tx:1.2,ty:6.4},{tx:10.6,ty:6.2},{tx:7.6,ty:7.0},{tx:0.6,ty:2.0} ];
  function drawPlant(p){
    const b = P(p.tx, p.ty, 0);
    ctx.beginPath(); ctx.ellipse(b.x,b.y+2,18,8,0,0,Math.PI*2);
    ctx.fillStyle='rgba(40,40,60,.16)'; ctx.fill();
    // pot
    ctx.beginPath();
    ctx.moveTo(b.x-13,b.y); ctx.lineTo(b.x+13,b.y);
    ctx.lineTo(b.x+9,b.y-20); ctx.lineTo(b.x-9,b.y-20); ctx.closePath();
    ctx.fillStyle='#c97b52'; ctx.fill();
    ctx.fillStyle='#a86038'; ctx.fillRect(b.x-9,b.y-22,18,4);
    // foliage
    ctx.fillStyle='#3fa65a';
    for (let i=0;i<6;i++){
      const ang = i/6*Math.PI*2;
      ctx.beginPath();
      ctx.ellipse(b.x+Math.cos(ang)*10, b.y-30+Math.sin(ang)*8, 12,9, ang,0,Math.PI*2);
      ctx.fill();
    }
    ctx.fillStyle='#5ecb78';
    ctx.beginPath(); ctx.ellipse(b.x,b.y-34,13,11,0,0,Math.PI*2); ctx.fill();
  }

  const BENCHES = [ {tx:3.4,ty:7.1},{tx:9.0,ty:6.9} ];
  function drawBench(bn){
    const b = P(bn.tx, bn.ty, 0);
    ctx.beginPath(); ctx.ellipse(b.x,b.y+3,26,8,0,0,Math.PI*2);
    ctx.fillStyle='rgba(40,40,60,.14)'; ctx.fill();
    // seat (iso plank)
    isoBox(bn.tx-0.05, bn.ty-0.05, 0.9, 0.35, 16,
           '#d98c4a', '#bf7838', '#a5642c');
    // backrest
    ctx.fillStyle='#bf7838';
    ctx.fillRect(b.x-22,b.y-28,4,14);
    ctx.fillStyle='#d98c4a';
    ctx.fillRect(b.x-22,b.y-30,40,5);
  }

  /* =========================================================
     NPCs — little walking people
     ========================================================= */
  function makeNPC(tx,ty,col){
    return { tx,ty, col, dir:Math.random()*Math.PI*2,
             spd:0.012+Math.random()*0.01, t:Math.random()*10 };
  }
  const NPCS = [
    makeNPC(3,4,'#ff6b8a'), makeNPC(8,5,'#7fd6ff'),
    makeNPC(6,3,'#9b8cff'), makeNPC(10,4.5,'#ffb04a')
  ];
  function updateNPC(n,dt){
    n.t += dt;
    if (Math.random()<0.012) n.dir += (Math.random()-0.5)*1.4;
    let nx = n.tx + Math.cos(n.dir)*n.spd;
    let ny = n.ty + Math.sin(n.dir)*n.spd;
    if (nx<0.6||nx>MAP_W-0.6){ n.dir = Math.PI - n.dir; nx=n.tx; }
    if (ny<2.0 ||ny>MAP_H-0.6){ n.dir = -n.dir; ny=n.ty; }
    n.tx=nx; n.ty=ny;
  }
  function drawPerson(tx,ty,col,bob){
    const f = P(tx,ty,0);
    ctx.beginPath(); ctx.ellipse(f.x,f.y+2,12,5,0,0,Math.PI*2);
    ctx.fillStyle='rgba(40,40,60,.18)'; ctx.fill();
    const by = -bob;
    // legs
    ctx.strokeStyle='#445166'; ctx.lineWidth=4; ctx.lineCap='round';
    const sw = Math.sin(bob*0.9+performance.now()/120)*4;
    ctx.beginPath(); ctx.moveTo(f.x-3,f.y+by-2); ctx.lineTo(f.x-3+sw,f.y-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(f.x+3,f.y+by-2); ctx.lineTo(f.x+3-sw,f.y-2); ctx.stroke();
    // body
    ctx.fillStyle=col;
    roundRect(f.x-8, f.y+by-30, 16, 24, 6); ctx.fill();
    // head
    ctx.fillStyle='#ffe0bd';
    ctx.beginPath(); ctx.arc(f.x, f.y+by-36, 8,0,Math.PI*2); ctx.fill();
    // hair
    ctx.fillStyle=shade(col,0.6);
    ctx.beginPath(); ctx.arc(f.x, f.y+by-39, 8, Math.PI,0); ctx.fill();
  }

  /* =========================================================
     TACO HERO
     ========================================================= */
  const taco = { tx:6, ty:6, speed:3.2 /*tiles/sec*/, walkT:0, moving:false };

  function drawTaco(){
    const bob = taco.moving ? Math.abs(Math.sin(taco.walkT*9))*5 : 0;
    const f = P(taco.tx, taco.ty, 0);
    // shadow
    ctx.beginPath(); ctx.ellipse(f.x, f.y+3, 22, 9, 0, 0, Math.PI*2);
    ctx.fillStyle='rgba(40,40,60,.22)'; ctx.fill();

    const cx = f.x, cy = f.y - bob;

    // little feet
    ctx.fillStyle='#caa23a';
    const step = taco.moving ? Math.sin(taco.walkT*9)*5 : 0;
    ctx.beginPath(); ctx.ellipse(cx-8, f.y-2, 6,4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx+8+step*0.3, f.y-2, 6,4,0,0,Math.PI*2); ctx.fill();

    // filling peeking out (clipped to shell area)
    ctx.save();
    ctx.beginPath(); ctx.ellipse(cx, cy-24, 22, 18, 0, 0, Math.PI*2); ctx.clip();
    ctx.fillStyle='#6fc25a'; ctx.fillRect(cx-22, cy-30, 44, 8);      // lettuce
    ctx.fillStyle='#d2533a';                                        // tomato/meat
    ctx.beginPath();
    ctx.arc(cx-7,cy-20,5,0,Math.PI*2); ctx.arc(cx+8,cy-22,5,0,Math.PI*2);
    ctx.arc(cx+1,cy-15,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd84a'; ctx.fillRect(cx-18, cy-14, 36, 5);     // cheese
    ctx.restore();

    // TORTILLA SHELL — folded taco (two halves)
    const shell = ctx.createLinearGradient(cx, cy-44, cx, cy);
    shell.addColorStop(0,'#ffe27a');
    shell.addColorStop(.5,'#f5cd46');
    shell.addColorStop(1,'#e0b32f');
    ctx.fillStyle = shell;
    ctx.strokeStyle = '#caa028'; ctx.lineWidth = 2;
    // left half
    ctx.beginPath();
    ctx.moveTo(cx-22, cy-2);
    ctx.quadraticCurveTo(cx-28, cy-44, cx-6, cy-44);
    ctx.lineTo(cx-6, cy-26);
    ctx.quadraticCurveTo(cx-14, cy-26, cx-14, cy-2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // right half
    ctx.beginPath();
    ctx.moveTo(cx+22, cy-2);
    ctx.quadraticCurveTo(cx+28, cy-44, cx+6, cy-44);
    ctx.lineTo(cx+6, cy-26);
    ctx.quadraticCurveTo(cx+14, cy-26, cx+14, cy-2);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    // toasty speckles
    ctx.fillStyle='rgba(180,130,30,.4)';
    ctx.beginPath();
    ctx.arc(cx-18,cy-30,1.4,0,7); ctx.arc(cx+17,cy-22,1.4,0,7);
    ctx.arc(cx-9,cy-10,1.4,0,7); ctx.fill();

    // little arms
    ctx.strokeStyle='#e0b32f'; ctx.lineWidth=4; ctx.lineCap='round';
    const aw = taco.moving ? Math.sin(taco.walkT*9)*6 : 0;
    ctx.beginPath(); ctx.moveTo(cx-16,cy-18); ctx.lineTo(cx-26, cy-10+aw); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+16,cy-18); ctx.lineTo(cx+26, cy-10-aw); ctx.stroke();

    // eyes
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(cx-6,cy-30,4.5,0,Math.PI*2); ctx.arc(cx+6,cy-30,4.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#222';
    ctx.beginPath(); ctx.arc(cx-5,cy-29,2.2,0,Math.PI*2); ctx.arc(cx+7,cy-29,2.2,0,Math.PI*2); ctx.fill();
    // smile
    ctx.strokeStyle='#7a4a18'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(cx, cy-22, 5, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke();
  }

  /* =========================================================
     SKYLIGHT / ATRIUM glow + light garland
     ========================================================= */
  function drawSkylightGlow(){
    const cx = VW/2;
    const g = ctx.createRadialGradient(cx, VH*0.30, 20, cx, VH*0.30, Math.max(VW,VH)*0.55);
    g.addColorStop(0,'rgba(255,255,255,.30)');
    g.addColorStop(.5,'rgba(255,245,210,.12)');
    g.addColorStop(1,'rgba(255,245,210,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  }
  function drawGarland(){
    const left  = P(0, 0, STORE_H+30);
    const right = P(MAP_W, 0, STORE_H+30);
    const segs = 26;
    ctx.lineWidth=2; ctx.strokeStyle='rgba(60,70,90,.5)';
    ctx.beginPath();
    for (let i=0;i<=segs;i++){
      const t=i/segs;
      const x=left.x+(right.x-left.x)*t;
      const sag=Math.sin(t*Math.PI)*26;
      const y=left.y+(right.y-left.y)*t + sag;
      if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
    }
    ctx.stroke();
    const cols=['#ff6b8a','#ffd84a','#7fd6ff','#7be0b0'];
    for (let i=0;i<=segs;i++){
      const t=i/segs;
      const x=left.x+(right.x-left.x)*t;
      const sag=Math.sin(t*Math.PI)*26;
      const y=left.y+(right.y-left.y)*t + sag;
      const tw=0.6+0.4*Math.sin(performance.now()/250 + i);
      ctx.globalAlpha=tw;
      ctx.fillStyle=cols[i%cols.length];
      ctx.beginPath(); ctx.arc(x,y+4,3.4,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  /* =========================================================
     DEPTH-SORTED SCENE ASSEMBLY
     sort key = (tx+ty) footprint; larger = nearer = drawn later.
     ========================================================= */
  function buildDrawList(){
    const list = [];
    STORES.forEach(s=>{
      list.push({ key:(s.tx + (-STORE_D)), fn:()=>drawStore(s) });
    });
    list.push({ key:((ESC.tx0+ESC.tx1)/2 + (ESC.ty0+ESC.ty1)/2), fn:drawEscalator });
    KIOSKS.forEach(k=> list.push({ key:(k.tx+K_W/2 + k.ty+K_D/2), fn:()=>drawKiosk(k) }) );
    PLANTS.forEach(p=> list.push({ key:(p.tx+p.ty), fn:()=>drawPlant(p) }) );
    BENCHES.forEach(b=> list.push({ key:(b.tx+b.ty), fn:()=>drawBench(b) }) );
    NPCS.forEach(n=> list.push({ key:(n.tx+n.ty),
                fn:()=>drawPerson(n.tx,n.ty,n.col, Math.abs(Math.sin(n.t*5))*4) }) );
    list.push({ key:(taco.tx+taco.ty)+0.01, fn:drawTaco });

    list.sort((a,b)=> a.key - b.key);
    return list;
  }

  /* =========================================================
     INPUT
     ========================================================= */
  const keys = {};
  window.addEventListener('keydown', e=>{
    const k=e.key.toLowerCase();
    keys[k]=true;
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  }, {passive:false});
  window.addEventListener('keyup', e=>{ keys[e.key.toLowerCase()]=false; });

  // touch d-pad
  const pad = { up:false,down:false,left:false,right:false };
  function bindPad(id, prop){
    const el = document.getElementById(id);
    const set=(v)=>(e)=>{ e.preventDefault(); pad[prop]=v; };
    el.addEventListener('touchstart', set(true), {passive:false});
    el.addEventListener('touchend',   set(false),{passive:false});
    el.addEventListener('touchcancel',set(false),{passive:false});
    el.addEventListener('mousedown',  set(true));
    el.addEventListener('mouseup',    set(false));
    el.addEventListener('mouseleave', set(false));
  }
  bindPad('pUp','up'); bindPad('pDown','down');
  bindPad('pLeft','left'); bindPad('pRight','right');
  if ('ontouchstart' in window || navigator.maxTouchPoints>0){
    document.body.classList.add('touch');
  }

  // collision: keep taco on floor and out of solid stuff
  function blocked(tx,ty){
    if (tx<0.4||tx>MAP_W-0.4) return true;
    if (ty<1.6||ty>MAP_H-0.4) return true;          // north wall barrier
    for (const k of KIOSKS){
      if (tx>k.tx-0.3 && tx<k.tx+K_W+0.3 && ty>k.ty-0.3 && ty<k.ty+K_D+0.3) return true;
    }
    return false;
  }

  function updateTaco(dt){
    let mx=0, my=0;
    // map intuitive arrows to iso tile axes
    if (keys['w']||keys['arrowup']   || pad.up)    { mx-=1; my-=1; }
    if (keys['s']||keys['arrowdown'] || pad.down)  { mx+=1; my+=1; }
    if (keys['a']||keys['arrowleft'] || pad.left)  { mx-=1; my+=1; }
    if (keys['d']||keys['arrowright']|| pad.right) { mx+=1; my-=1; }

    taco.moving = (mx!==0||my!==0);
    if (taco.moving){
      const len=Math.hypot(mx,my); mx/=len; my/=len;
      const stepDist = taco.speed*dt;
      const nx = taco.tx + mx*stepDist;
      const ny = taco.ty + my*stepDist;
      if (!blocked(nx, taco.ty)) taco.tx = nx;
      if (!blocked(taco.tx, ny)) taco.ty = ny;
      taco.walkT += dt;
    }
  }

  /* =========================================================
     MAIN LOOP
     ========================================================= */
  let last = performance.now();
  function frame(now){
    let dt = (now - last)/1000; last = now;
    if (dt>0.05) dt=0.05;            // clamp

    // update
    escPhase = (escPhase + dt*0.45) % 1;
    NPCS.forEach(n=>updateNPC(n,dt));
    updateTaco(dt);

    // clear with bright mall ambient
    const bg = ctx.createLinearGradient(0,0,0,VH);
    bg.addColorStop(0,'#dff0fa');
    bg.addColorStop(.55,'#eaf4f0');
    bg.addColorStop(1,'#f3ecdf');
    ctx.fillStyle=bg; ctx.fillRect(0,0,VW,VH);

    drawSkylightGlow();
    drawFloor();
    drawGarland();

    // depth-sorted props + characters
    const list = buildDrawList();
    for (const o of list) o.fn();

    requestAnimationFrame(frame);
  }

  // ---- boot ----
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
