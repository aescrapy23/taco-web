  r = clamp(Math.round(r * f), 0, 255); g = clamp(Math.round(g * f), 0, 255); b = clamp(Math.round(b * f), 0, 255);

function beep(freq, dur, type, vol) {
  if (!actx || mute) return;
  try {
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || "square"; o.frequency.value = freq; g.gain.value = vol || 0.05;
    o.connect(g); g.connect(actx.destination);
    const t = actx.currentTime; g.gain.setValueAtTime(g.gain.value, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur); o.start(t); o.stop(t + dur);
  } catch (e) {}
}

function spawnEnemy(boss) {

  state = "quiz";
}
function mathTier() { const age = profile ? profile.age : 10; return age < 8 ? 0 : age < 11 ? 1 : age < 14 ? 2 : 3; }
function openMathQuiz() {

  else { if (r < 0.35) { const p = [10, 20, 25, 50][randi(0, 4)]; a = randi(2, 12) * (100 / p); ans = a * p / 100; prompt = p + "% de " + a; } else if (r < 0.7) { a = randi(6, 16); b = randi(6, 16); ans = a * b; prompt = a + " × " + b; } else { b = randi(3, 12); ans = randi(3, 15); a = b * ans; prompt = a + " ÷ " + b; } }

function draw3DBuilding(g, b) {
  const px = b.x * TS, py = b.y * TS, pw = b.w * TS, ph = b.h * TS;
  const EH = 22 + (b.seed % 5) * 11;          // altura variable (skyline mas 3D)
  const roof = b.tint;

  g.fillStyle = "rgba(0,0,0,0.36)"; g.beginPath(); g.roundRect(px + 10, py + 12, pw, ph, 8); g.fill();
  // pared SUR (frontal) con degradado vertical (luz arriba -> sombra abajo)
  const sg = g.createLinearGradient(0, py + ph, 0, py + ph + EH); sg.addColorStop(0, shadeHex(roof, 0.64)); sg.addColorStop(1, shadeHex(roof, 0.32));
  g.fillStyle = sg; g.fillRect(px, py + ph, pw, EH);
  // pared ESTE (lateral) en perspectiva, mas oscura
  g.fillStyle = shadeHex(roof, 0.3); g.beginPath(); g.moveTo(px + pw, py); g.lineTo(px + pw + EH, py + EH); g.lineTo(px + pw + EH, py + ph + EH); g.lineTo(px + pw, py + ph); g.closePath(); g.fill();

  const wc = Math.max(2, Math.round(pw / 26)), wr = Math.max(2, Math.round(EH / 15));
  const ww = (pw - 12) / wc - 5, wh = (EH - 10) / wr - 4;
  for (let c = 0; c < wc; c++) for (let r = 0; r < wr; r++) if (ww > 2 && wh > 2) {
    const wx2 = px + 6 + c * (pw - 12) / wc + 2, wy2 = py + ph + 6 + r * (EH - 8) / wr, lit = rnd() < 0.5;
    g.fillStyle = lit ? "#ffe7a0" : "#19202c"; g.fillRect(wx2, wy2, ww, wh);
    if (lit) { g.fillStyle = "rgba(255,255,255,0.3)"; g.fillRect(wx2, wy2, ww, 2); }
  }
  // lineas de pisos en la pared ESTE (sensacion de altura)
  g.strokeStyle = shadeHex(roof, 0.2); g.lineWidth = 1; for (let r = 1; r < wr; r++) { const e0 = py + (ph) * r / wr; g.beginPath(); g.moveTo(px + pw, e0); g.lineTo(px + pw + EH, e0 + EH); g.stroke(); }
  // TIENDA: toldo a rayas + vidriera + cartel en la planta baja
  if (b.shop) {
    const ay = py + ph; const stripes = Math.max(3, Math.round(pw / 16));
    g.fillStyle = "rgba(0,0,0,0.3)"; g.fillRect(px, ay - 9, pw, 9); // cartel
    g.fillStyle = "#ffe7a0"; for (let i = 0; i < Math.round(pw / 18); i++) g.fillRect(px + 6 + i * 18, ay - 7, 9, 5); // letras del cartel (luz)
    for (let i = 0; i < stripes; i++) { g.fillStyle = i % 2 ? b.awn : "#f3ece0"; g.fillRect(px + i * pw / stripes, ay, pw / stripes + 1, 8); }
    g.fillStyle = "rgba(0,0,0,0.18)"; g.fillRect(px, ay + 7, pw, 2);

    g.fillStyle = "#e0b840"; g.beginPath(); g.arc(dx + dw - 5, dy + dh * 0.6, 1.8, 0, 7); g.fill();

  g.fillStyle = rgd; g.beginPath(); g.roundRect(px, py, pw, ph, 4); g.fill();
  g.fillStyle = shadeHex(roof, 1.32); g.fillRect(px, py, pw, 3); g.fillRect(px, py, 3, ph); // luz arriba-izq
  g.fillStyle = "rgba(0,0,0,0.22)"; g.fillRect(px, py + ph - 3, pw, 3); g.fillRect(px + pw - 3, py, 3, ph); // sombra abajo-der

  if (flashT > 0) { ctx.fillStyle = "rgba(" + flashCol + "," + (0.4 * flashT / flashMax) + ")"; ctx.fillRect(0, 0, W, H); }
  // pulso rojo con poca vida (tension)
  if (state === "play" && player.hp < MAXHP * 0.3) { const pz = 0.1 + 0.12 * (0.5 + 0.5 * Math.sin(t * 8)); const vg2 = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.7); vg2.addColorStop(0, "rgba(0,0,0,0)"); vg2.addColorStop(1, "rgba(220,40,40," + pz + ")"); ctx.fillStyle = vg2; ctx.fillRect(0, 0, W, H); }

  if (state === "play" || state === "quiz" || state === "shop") { drawHUD(); }
  if (state === "play") { drawMinimap(); drawStick(stickL, "rgba(94,234,212,0.5)"); drawStick(stickR, "rgba(255,150,60,0.6)"); drawButtons(); }
  if (bannerT > 0 && (state === "play" || state === "quiz")) { const a = clamp(bannerT / 0.6, 0, 1) * clamp((2.4 - bannerT) / 0.3, 0, 1); ctx.globalAlpha = a; text("MUNDO " + level, W / 2, H * 0.3, Math.min(46, W / 9), "#fff", "center"); text(theme.name, W / 2, H * 0.3 + 38, Math.min(32, W / 11), hexA(theme.stud, 1), "center"); text("MISION: " + (mission ? mission.text : "junta las gemas"), W / 2, H * 0.3 + 70, 14, "#f5cd46", "center"); ctx.globalAlpha = 1; }
  if (state === "quiz") drawQuiz();
  if (state === "shop") drawShop();
  if (state === "wardrobe") drawWardrobe();
  if (state === "options") drawOptions();
  if (state === "menu") drawMenu();
  if (state === "interior") drawInterior();
  if (state === "roulette") drawRoulette();
  if (state === "challenge") drawChallenge();
  if (state === "players") drawPlayers();
  if (paused && state === "play") { ctx.fillStyle = "rgba(6,6,12,0.6)"; ctx.fillRect(0, 0, W, H); text("PAUSA", W / 2, H / 2, 48, "#f5cd46", "center"); text("toca II para seguir", W / 2, H / 2 + 40, 16, "#9a9ab0", "center"); drawButtons(); }
  if (state === "title") {
    ctx.fillStyle = "rgba(8,8,16,0.62)"; ctx.fillRect(0, 0, W, H);
    drawTaco(W / 2, H / 2 - 140, Math.min(70, W / 6), 7); // taco evolucionado de muestra
    text("CATACOMB", W / 2, H / 2 - 50, Math.min(72, W / 7), "#f5cd46", "center");
    text("el taco en la catacumba", W / 2, H / 2 - 8, 18, "#96c8eb", "center");
    if (profile) text("Hola " + profile.name + "  ·  Ingles " + LESSONS.EN.levels[profile.eng].tag + "  ·  Chino " + LESSONS.ZH.levels[profile.zh].tag, W / 2, H / 2 + 18, 13, "#9be7c0", "center");
    const trun = curPlayer ? loadRun() : null;
    if (trun && trun.level) {
      const cr = titleContinueRect(); const pulse = 0.5 + 0.5 * Math.sin(t * 4);
      ctx.shadowColor = "#62e074"; ctx.shadowBlur = 8 + pulse * 8; ctx.fillStyle = "#16341f"; ctx.beginPath(); ctx.roundRect(cr.x, cr.y, cr.w, cr.h, 12); ctx.fill(); ctx.shadowBlur = 0; ctx.strokeStyle = "#62e074"; ctx.lineWidth = 3; ctx.stroke();
      text("CONTINUAR  ·  Mundo " + trun.level, cr.x + cr.w / 2, cr.y + cr.h / 2 + 7, 19, "#9be7c0", "center");
      text("tocá la pantalla = NUEVA partida", W / 2, cr.y + cr.h + 22, 13, "#8a8aa0", "center");
    } else text("TOCA PARA JUGAR", W / 2, H / 2 + 52, 22, "#f5cd46", "center");
    text("izq: mover (doble-toque = esquive) · der: apuntar/disparar", W / 2, H / 2 + 88, 14, "#8a8aa0", "center");
    text("dimensiones, tiendas, minimapa · aprende INGLES y CHINO (frases)", W / 2, H / 2 + 112, 13, "#7a7a90", "center");
    const wr = titleWbRect();
    ctx.fillStyle = "#2a2030"; ctx.strokeStyle = "#f5cd46"; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(wr.x, wr.y, wr.w, wr.h, 10); ctx.fill(); ctx.stroke();
    text("VESTUARIO", wr.x + wr.w / 2, wr.y + wr.h / 2 + 6, 15, "#f5cd46", "center");
    const orr = titleOptRect();
    ctx.fillStyle = "#1f2a30"; ctx.strokeStyle = "#7fd6ff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(orr.x, orr.y, orr.w, orr.h, 10); ctx.fill(); ctx.stroke();
    text("OPCIONES", orr.x + orr.w / 2, orr.y + orr.h / 2 + 6, 15, "#7fd6ff", "center");
    text("build " + VERSION, W / 2, H - 14 - safeB, 11, "#586", "center");
  }
  if (state === "over") {
    ctx.fillStyle = "rgba(6,6,12,0.8)"; ctx.fillRect(0, 0, W, H);
    text("GAME OVER", W / 2, H / 2 - 30, Math.min(64, W / 8), "#eb5040", "center");
    let mAll = 0, tAll = 0; for (const lk of LANGS) { const md = masteredTotalL(LESSONS[lk]); mAll += md[0]; tAll += md[1]; }
    text("PUNTAJE  " + score, W / 2, H / 2 + 22, 26, "#fff", "center");
    text("APRENDIDAS " + words + "    DOMINADAS " + mAll + "/" + tAll + " (EN+ZH)", W / 2, H / 2 + 52, 15, "#60d050", "center");
    text("RECORD  " + best, W / 2, H / 2 + 76, 15, "#9a9ab0", "center");
    text("TOCA PARA REINTENTAR", W / 2, H / 2 + 110, 20, "#f5cd46", "center");
  }
}

// roundRect fallback (navegadores viejos)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) { this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath(); return this; };
}

// ===== Arranque de perfiles: migrar progreso viejo (1 jugador) o pedir crear jugador =====
(function initPlayers() {
  if (players.length === 0) {
    let hadOld = null; try { hadOld = localStorage.getItem("catacomb_profile") || localStorage.getItem("catacomb_best") || localStorage.getItem("catacomb_maxworld"); } catch (e) {}
    if (hadOld) {
      let pr = null; try { pr = JSON.parse(localStorage.getItem("catacomb_profile") || "null"); } catch (e) {}
      const nm = (pr && pr.name) ? String(pr.name).slice(0, 14) : "JUGADOR 1";
      players.push(nm); curPlayer = nm; savePlayers();
      const map = { best: "catacomb_best", bank: "catacomb_bank", outfit: "catacomb_outfit", maxworld: "catacomb_maxworld", lang: "catacomb_lang", unlocked: "catacomb_unlocked", lstats: "catacomb_lstats", profile: "catacomb_profile" };
      for (const k in map) { let v = null; try { v = localStorage.getItem(map[k]); } catch (e) {} if (v != null) lset(k, v); }
      loadPlayerData(); state = "title";
    } else { state = "players"; }
  } else {
    if (!curPlayer || players.indexOf(curPlayer) < 0) curPlayer = players[0];
    loadPlayerData(); state = "title";
  }
})();

let last = performance.now();
function frame(now) { let dt = (now - last) / 1000; last = now; if (dt > 0.05) dt = 0.05; update(dt); render(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);

// PWA: instalable + offline + actualiza solo (network-first)
if ("serviceWorker" in navigator) { try { navigator.serviceWorker.register("sw.js"); } catch (e) {} }
// guardar la partida en curso al ocultar/cerrar (para CONTINUAR donde se quedo)
document.addEventListener("visibilitychange", () => { if (document.hidden && state === "play") saveRun(); });
window.addEventListener("pagehide", () => { if (state === "play") saveRun(); });
</script>
</body>
