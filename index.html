function beep(freq, dur, type, vol) {

  } catch (e) {}
}

let lstats = {}; try { lstats = JSON.parse(localStorage.getItem("catacomb_lstats") || "{}"); } catch (e) { lstats = {}; }
function saveL() { try { localStorage.setItem("catacomb_lstats", JSON.stringify(lstats)); } catch (e) {} }
function itemKey(it) { return it[1]; }
function lstat(k) { return lstats[k] || (lstats[k] = { seen: 0, ok: 0, streak: 0 }); }
function masteredK(k) { const s = lstats[k]; return !!s && s.streak >= 3; }
function dispOf(L, it) { return L.code === "zh-CN" ? it[1] + "  " + it[2] : it[1]; }
function levelMastered(L, lv) { let n = 0; for (const it of lv.items) if (masteredK(itemKey(it))) n++; return n; }
function langTierIdx(L) { let m = L.levels.length - 1; for (let i = 0; i < L.levels.length - 1; i++) if (levelMastered(L, L.levels[i]) < 5) { m = i; break; } return Math.max(m, startTierFor(L)); }

function ageToTier(age, maxT) { const b = age < 8 ? 0 : age < 11 ? 1 : age < 14 ? 2 : age < 17 ? 3 : 4; return clamp(b + 1, 0, maxT); }
function startTierFor(L) { if (!profile) return 0; return L.code === "zh-CN" ? (profile.zh || 0) : (profile.eng || 0); }
function askProfile() {
  let nm = null; try { nm = prompt("Hola! Como te llamas?", (profile && profile.name) || ""); } catch (e) {}
  nm = ((nm || "JUGADOR").trim().slice(0, 14)) || "JUGADOR";
  let ageStr = null; try { ageStr = prompt("Cuantos anios tenes? (un numero)", (profile && String(profile.age)) || "10"); } catch (e) {}
  let age = parseInt(ageStr); if (!age || age < 3 || age > 99) age = 10;
  profile = { name: nm, age: age, eng: ageToTier(age, LESSONS.EN.levels.length - 1), zh: ageToTier(Math.max(6, age - 3), LESSONS.ZH.levels.length - 1) };
  try { localStorage.setItem("catacomb_profile", JSON.stringify(profile)); } catch (e) {}
}
function masteredTotalL(L) { let n = 0, tot = 0; for (const lv of L.levels) for (const it of lv.items) { tot++; if (masteredK(itemKey(it))) n++; } return [n, tot]; }
function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = randi(0, i + 1); const tmp = a[i]; a[i] = a[j]; a[j] = tmp; } return a; }
function pickItem() {
  const L = LESSONS[lang], top = langTierIdx(L), pool = [];
  for (let i = 0; i <= top; i++) for (const it of L.levels[i].items) pool.push({ it, tier: i });
  const weights = pool.map(p => { const s = lstats[itemKey(p.it)]; let w = !s || s.seen === 0 ? 3 : s.streak === 0 ? 5 : s.streak < 3 ? 3 : 1; if (p.tier === top) w += 1; return w; });
  let total = 0; for (const x of weights) total += x;
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++) { r -= weights[i]; if (r <= 0) return { L, item: pool[i].it }; }
  return { L, item: pool[pool.length - 1].it };
}

  for (let x = 0; x < cols; x++) { grid[x] = 1; grid[(rows - 1) * cols + x] = 1; }

  const clusters = 4 + level;
  for (let c = 0; c < clusters; c++) {
    const bx = randi(2, cols - 3), by = randi(2, rows - 3), bw = randi(1, 4), bh = randi(1, 3);
    for (let y = by; y < Math.min(by + bh, rows - 2); y++) for (let x = bx; x < Math.min(bx + bw, cols - 2); x++) grid[y * cols + x] = 1;
  }
  const sx = Math.floor(cols / 2), sy = Math.floor(rows / 2);
  for (let y = sy - 1; y <= sy + 1; y++) for (let x = sx - 1; x <= sx + 1; x++) if (x > 0 && y > 0 && x < cols - 1 && y < rows - 1) grid[y * cols + x] = 0;

  player.x = (sx + 0.5) * TS; player.y = (sy + 0.5) * TS; player.vx = player.vy = 0;
  { const c = camClamp(); camX = c.tx; camY = c.ty; }
  gems = []; enemies = []; bullets = []; parts = []; heals = []; powerDrops = []; eshots = []; rings = []; peds = []; cars = []; props = []; portal = null;

  for (let i = 0; i < ne; i++) spawnEnemy(false);

  bannerT = 2.4; // cartel del mundo
}

function spawnEnemy(boss) {

  if (boss) {
    enemies.push({ x: p.x, y: p.y, vx: 0, vy: 0, r: 40, hp: 18 + level * 2, maxhp: 18 + level * 2, speed: 50 + level * 2, col: "#ba40d0", bounty: 500, dmg: 22, flash: 0, boss: true });

  }
  // Dificultad progresiva (neural): tanque desde nivel 3, TIRADOR recién desde nivel 7.
  const r = Math.random();
  const pShooter = level >= 7 ? 0.10 + Math.min(level - 7, 8) * 0.025 : 0; // crece de a poco tras el 7
  const pTank = level >= 3 ? 0.20 + Math.min(level, 10) * 0.015 : 0;

  else if (r < pShooter + pTank) e = { x: p.x, y: p.y, vx: 0, vy: 0, r: 26, hp: 5 + Math.floor(level / 2), speed: 55 + level * 3, col: "#9698a4", bounty: 60, dmg: 16 };
  else e = { x: p.x, y: p.y, vx: 0, vy: 0, r: 16, hp: 2 + Math.floor(level / 3), speed: 90 + level * 6, col: "#e24a3c", bounty: 30, dmg: 10 };
  const dm = diffMul(); e.hp = Math.max(1, Math.round(e.hp * dm.hp)); e.dmg = e.dmg * dm.dmg;

}

function moveAxis(e, dx, dy) {
  e.x += dx; e.y += dy; const r = e.r;
  const x0 = Math.floor((e.x - r) / TS), x1 = Math.floor((e.x + r) / TS), y0 = Math.floor((e.y - r) / TS), y1 = Math.floor((e.y + r) / TS);
  for (let ty = y0; ty <= y1; ty++) for (let tx = x0; tx <= x1; tx++) {

    if (dx > 0) e.x = tx * TS - r - 0.01; else if (dx < 0) e.x = (tx + 1) * TS + r + 0.01;

}

function readInput() {

  if (keys["w"] || keys["arrowup"]) my -= 1;

// ---------- Flujo ----------
function startOrRestart() { if (!profile) askProfile(); level = 1; score = 0; words = 0; coins = 5; player.hp = MAXHP; pShield = pTriple = pRapid = 0; weapon = 0; paused = false; floaters = []; combo = 0; comboT = 0; flashT = 0; dashT = 0; dashCD = 0; genLevel(); state = "play"; sLevel(); }

// Portal "neural": mezcla idioma + matematica + logica segun avance
function openQuiz() {
  const r = Math.random();
  if (r < 0.5) openLangQuiz(); else if (r < 0.78) openMathQuiz(); else openLogicQuiz();
}
function openLangQuiz() {
  const { L, item } = pickItem();
  const ans = dispOf(L, item);
  const all = [];
  for (const lv of L.levels) for (const it of lv.items) { const d = dispOf(L, it); if (d !== ans) all.push(d); }
  const opts = [ans]; let guard = 0;
  while (opts.length < 3 && all.length && guard++ < 300) { const o = all[randi(0, all.length)]; if (opts.indexOf(o) < 0) opts.push(o); }
  shuffle(opts);
  quiz = { kind: "lang", L, prompt: item[0], key: itemKey(item), say: item[1], options: opts, correct: opts.indexOf(ans), sel: -1, fb: 0, t0: t };
  state = "quiz";
}
function numMCQ(ans, prompt, kind) {
  const spread = Math.max(3, Math.round(Math.abs(ans) * 0.3)) + 1;
  const opts = [ans]; let guard = 0;
  while (opts.length < 3 && guard++ < 60) { const w = ans + randi(-spread, spread + 1); if (w !== ans && w >= 0 && opts.indexOf(w) < 0) opts.push(w); }
  while (opts.length < 3) opts.push(ans + opts.length + 1);
  const strs = opts.map(String); shuffle(strs);
  quiz = { kind, prompt, options: strs, correct: strs.indexOf(String(ans)), sel: -1, fb: 0, t0: t, L: null, say: null };
  state = "quiz";
}
function mathTier() { const age = profile ? profile.age : 10; return age < 8 ? 0 : age < 11 ? 1 : age < 14 ? 2 : 3; }
function openMathQuiz() {
  const T = mathTier(), r = Math.random(); let a, b, ans, prompt;
  if (T <= 0) { a = randi(1, 11); b = randi(1, 11); if (r < 0.5) { ans = a + b; prompt = a + " + " + b; } else { if (a < b) { const x = a; a = b; b = x; } ans = a - b; prompt = a + " - " + b; } }
  else if (T === 1) { if (r < 0.45) { a = randi(2, 10); b = randi(2, 10); ans = a * b; prompt = a + " × " + b; } else if (r < 0.75) { a = randi(10, 50); b = randi(5, 40); ans = a + b; prompt = a + " + " + b; } else { a = randi(20, 70); b = randi(5, 30); ans = a - b; prompt = a + " - " + b; } }
  else if (T === 2) { if (r < 0.4) { b = randi(2, 9); ans = randi(2, 12); a = b * ans; prompt = a + " ÷ " + b; } else if (r < 0.75) { a = randi(3, 13); b = randi(3, 13); ans = a * b; prompt = a + " × " + b; } else { a = randi(40, 130); b = randi(10, 60); ans = a - b; prompt = a + " - " + b; } }
  else { if (r < 0.35) { const p = [10, 20, 25, 50][randi(0, 4)]; a = randi(2, 12) * (100 / p); ans = a * p / 100; prompt = p + "% de " + a; } else if (r < 0.7) { a = randi(6, 16); b = randi(6, 16); ans = a * b; prompt = a + " × " + b; } else { b = randi(3, 12); ans = randi(3, 15); a = b * ans; prompt = a + " ÷ " + b; } }
  numMCQ(ans, prompt + " = ?", "math");
}
function openLogicQuiz() {
  const r = Math.random();
  if (r < 0.6) { const s0 = randi(1, 9), st = randi(2, 6); numMCQ(s0 + 4 * st, "Que sigue?   " + [s0, s0 + st, s0 + 2 * st, s0 + 3 * st].join(", ") + ", ?", "logic"); }
  else if (r < 0.85) { const s0 = randi(1, 4); numMCQ(s0 * 16, "Que sigue?   " + [s0, s0 * 2, s0 * 4, s0 * 8].join(", ") + ", ?", "logic"); }
  else { const s0 = randi(20, 40), st = randi(2, 5); numMCQ(s0 - 4 * st, "Que sigue?   " + [s0, s0 - st, s0 - 2 * st, s0 - 3 * st].join(", ") + ", ?", "logic"); }
}
function answerQuiz(i) {

function fire(ax, ay) {

    const [dx, dy] = rot(ax, ay, tt * spread);

  }

function update(dt) {
  t += dt;

  playerMoving = (Math.abs(inp.mx) + Math.abs(inp.my)) > 0.12;
  walkPhase += dt * (playerMoving ? 13 : 2.5);

  // esquive / dash

  if (dashT > 0) { dashT -= dt; moveAxis(player, dashDir.x * 880 * dt, 0); moveAxis(player, 0, dashDir.y * 880 * dt); }
  { const c = camClamp(); camX += (c.tx - camX) * Math.min(1, dt * 9); camY += (c.ty - camY) * Math.min(1, dt * 9); } // camara sigue al taco
  // tienda
  if (shop) { const near = len(shop.x - player.x, shop.y - player.y) < player.r + 28; if (near && !shopLock) { state = "shop"; return; } if (!near) shopLock = false; }
  if (player.inv > 0) player.inv -= dt;
  pShield = Math.max(0, pShield - dt); pTriple = Math.max(0, pTriple - dt); pRapid = Math.max(0, pRapid - dt);
  if (comboT > 0) { comboT -= dt; if (comboT <= 0) combo = 0; }
  player.fire -= dt;
  if (inp.firing && player.fire <= 0) fire(inp.ax, inp.ay);

  for (let i = gems.length - 1; i >= 0; i--) if (len(gems[i].x - player.x, gems[i].y - player.y) < player.r + 14) { addParts(gems[i].x, gems[i].y, 10, "#5eead4", 150); floatText(gems[i].x, gems[i].y, "+10", "#5eead4"); gems.splice(i, 1); score += 10; coins += 1; sGem(); }
  // gente caminando (mundo vivo) + rescate (mision)
  for (const p of peds) {
    p.wp += dt * 7;
    if (p.rescued) continue;
    if (!isFloor(p.x + p.vx * dt + Math.sign(p.vx) * p.r, p.y)) p.vx *= -1;
    if (!isFloor(p.x, p.y + p.vy * dt + Math.sign(p.vy) * p.r)) p.vy *= -1;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (Math.random() < 0.008) { const a = Math.random() * 6.28; p.vx = Math.cos(a) * 42; p.vy = Math.sin(a) * 42; }
    if (mission.type === 2 && len(p.x - player.x, p.y - player.y) < player.r + p.r + 4) { p.rescued = true; p.vx = p.vy = 0; mission.prog++; coins += 2; floatText(p.x, p.y, "RESCATADO!", "#9be7c0"); addParts(p.x, p.y, 12, "#9be7c0", 180); sGem(); }

}

  }
  if (isLang) {
    const md = masteredTotalL(quiz.L), bx = p.x + 28, bw = p.w - 56, by = p.y + p.h - 48;
    ctx.fillStyle = "#222630"; ctx.beginPath(); ctx.roundRect(bx, by, bw, 8, 4); ctx.fill();
    ctx.fillStyle = "#60d050"; ctx.beginPath(); ctx.roundRect(bx, by, bw * (md[0] / Math.max(1, md[1])), 8, 4); ctx.fill();
    text("Dominadas " + md[0] + "/" + md[1] + "   ·   boton " + lang + " cambia idioma", W / 2, p.y + p.h - 30, 12, "#8a8aa0", "center");
  } else text(kind === "math" ? "Matematica neural · gana monedas resolviendo" : "Logica · encontra el patron", W / 2, p.y + p.h - 30, 12, "#8a8aa0", "center");
  if (quiz.sel >= 0) text(quiz.sel === quiz.correct ? "CORRECTO!  +80" : "Era:  " + quiz.options[quiz.correct], W / 2, p.y + p.h - 12, 16, quiz.sel === quiz.correct ? "#60d050" : "#eb6050", "center");
  ctx.restore();
}

function render() {
  // fondo (espacio de pantalla)
  ctx.fillStyle = theme.floor; ctx.fillRect(0, 0, W, H);
  const bgGlow = ctx.createRadialGradient(W / 2, H * 0.42, 40, W / 2, H * 0.42, Math.max(W, H) * 0.62);
  bgGlow.addColorStop(0, hexA(theme.stud, 0.12)); bgGlow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = bgGlow; ctx.fillRect(0, 0, W, H);
  // MUNDO con camara
  ctx.save();
  let _ox = camX, _oy = camY; if (shake > 0) { _ox -= rand(-shake, shake); _oy -= rand(-shake, shake); }
  ctx.translate(-_ox, -_oy);
  if (dcanvas.width > 0) ctx.drawImage(dcanvas, 0, 0, cols * TS, rows * TS);
  for (const pr of props) drawProp(pr);
  for (const g of gems) drawGem(g.x, g.y);
  for (const h of heals) drawHeal(h.x, h.y);
  for (const pd of powerDrops) drawPower(pd.x, pd.y, pd.kind);
  if (shop) { const yb = Math.sin(t * 4) * 2; ctx.fillStyle = "#caa23a"; ctx.fillRect(shop.x - 14, shop.y - 14 + yb, 28, 26); ctx.fillStyle = "#3a2a08"; ctx.fillRect(shop.x - 14, shop.y - 14 + yb, 28, 7); text("$", shop.x, shop.y + 6 + yb, 18, "#3a2408", "center"); }
  if (portal) drawPortal(portal.x, portal.y);
  for (const b of bullets) { ctx.fillStyle = "#ff8c32"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill(); ctx.fillStyle = "#ffe896"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.5, 0, 7); ctx.fill(); }
  for (const s of eshots) { ctx.fillStyle = "#78d2eb"; ctx.beginPath(); ctx.arc(s.x, s.y, 8, 0, 7); ctx.fill(); ctx.fillStyle = "#dff4ff"; ctx.beginPath(); ctx.arc(s.x, s.y, 4, 0, 7); ctx.fill(); }
  for (const c of cars) drawCar(c);
  for (const p of peds) drawPed(p);
  for (const e of enemies) { drawBlock(ctx, e.x - e.r, e.y - e.r, e.r * 2, e.flash > 0 ? "#ffffff" : e.col); if (e.hp < e.maxhp && !e.boss) bar(e.x - e.r, e.y - e.r - 8, e.r * 2, 4, e.hp / e.maxhp, "#60d050"); }
  for (const rg of rings) { ctx.globalAlpha = clamp(rg.life, 0, 1) * 0.7; ctx.strokeStyle = rg.col; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(rg.x, rg.y, rg.r, 0, 7); ctx.stroke(); }
  ctx.globalAlpha = 1;
  if (!(player.inv > 0 && Math.floor(t * 20) % 2)) drawTaco(player.x, player.y, player.r * 2.2, level);
  { const cd = dashCD <= 0 ? 1 : 1 - dashCD / 0.9; ctx.globalAlpha = dashCD <= 0 ? 0.3 + 0.22 * Math.sin(t * 6) : 0.55; ctx.strokeStyle = "#5eead4"; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.arc(player.x, player.y, player.r + 11, -Math.PI / 2, -Math.PI / 2 + cd * 2 * Math.PI); ctx.stroke(); ctx.globalAlpha = 1; }
  for (const p of parts) { ctx.globalAlpha = clamp(p.life / p.max, 0, 1); ctx.fillStyle = p.col; ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r); }
  for (const f of floaters) { ctx.globalAlpha = clamp(f.life, 0, 1); text(f.txt, f.x, f.y, 17, f.col, "center"); }
  ctx.globalAlpha = 1;
  ctx.restore();
  // polvo de ambiente (solo graficos ALTA)
  if (glowOn()) { for (const a of ambient) { ctx.globalAlpha = 0.2 + 0.26 * (0.5 + 0.5 * Math.sin(t * 2 + a.tw)); ctx.fillStyle = theme.stud; ctx.beginPath(); ctx.arc(a.x, a.y, a.r, 0, 7); ctx.fill(); } ctx.globalAlpha = 1; }

  // Viñeta + destello (4D)
  const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.32, W / 2, H / 2, Math.max(W, H) * 0.72);
  vg.addColorStop(0, "rgba(0,0,0,0)"); vg.addColorStop(1, "rgba(0,0,0,0.42)");
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  if (flashT > 0) { ctx.fillStyle = "rgba(" + flashCol + "," + (0.4 * flashT / flashMax) + ")"; ctx.fillRect(0, 0, W, H); }
  // pulso rojo con poca vida (tension)
  if (state === "play" && player.hp < MAXHP * 0.3) { const pz = 0.1 + 0.12 * (0.5 + 0.5 * Math.sin(t * 8)); const vg2 = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.7); vg2.addColorStop(0, "rgba(0,0,0,0)"); vg2.addColorStop(1, "rgba(220,40,40," + pz + ")"); ctx.fillStyle = vg2; ctx.fillRect(0, 0, W, H); }

  if (state === "play" || state === "quiz" || state === "shop") { drawHUD(); }
  if (state === "play") { drawMinimap(); drawStick(stickL, "rgba(94,234,212,0.5)"); drawStick(stickR, "rgba(255,150,60,0.6)"); drawButtons(); }
  if (bannerT > 0 && (state === "play" || state === "quiz")) { const a = clamp(bannerT / 0.6, 0, 1) * clamp((2.4 - bannerT) / 0.3, 0, 1); ctx.globalAlpha = a; text("MUNDO " + level, W / 2, H * 0.3, Math.min(46, W / 9), "#fff", "center"); text(theme.name, W / 2, H * 0.3 + 38, Math.min(32, W / 11), hexA(theme.stud, 1), "center"); text("MISION: " + (mission ? mission.text : "junta las gemas"), W / 2, H * 0.3 + 70, 14, "#f5cd46", "center"); ctx.globalAlpha = 1; }
  if (state === "quiz") drawQuiz();
  if (state === "shop") drawShop();
  if (state === "wardrobe") drawWardrobe();
  if (state === "options") drawOptions();
  if (paused && state === "play") { ctx.fillStyle = "rgba(6,6,12,0.6)"; ctx.fillRect(0, 0, W, H); text("PAUSA", W / 2, H / 2, 48, "#f5cd46", "center"); text("toca II para seguir", W / 2, H / 2 + 40, 16, "#9a9ab0", "center"); drawButtons(); }
  if (state === "title") {
    ctx.fillStyle = "rgba(8,8,16,0.62)"; ctx.fillRect(0, 0, W, H);
    drawTaco(W / 2, H / 2 - 140, Math.min(70, W / 6), 7); // taco evolucionado de muestra
    text("CATACOMB", W / 2, H / 2 - 50, Math.min(72, W / 7), "#f5cd46", "center");
    text("el taco en la catacumba", W / 2, H / 2 - 8, 18, "#96c8eb", "center");
    if (profile) text("Hola " + profile.name + "  ·  Ingles " + LESSONS.EN.levels[profile.eng].tag + "  ·  Chino " + LESSONS.ZH.levels[profile.zh].tag, W / 2, H / 2 + 20, 13, "#9be7c0", "center");
    text("TOCA PARA JUGAR", W / 2, H / 2 + 52, 22, "#f5cd46", "center");
    text("izq: mover (doble-toque = esquive) · der: apuntar/disparar", W / 2, H / 2 + 88, 14, "#8a8aa0", "center");
    text("dimensiones, tiendas, minimapa · aprende INGLES y CHINO (frases)", W / 2, H / 2 + 112, 13, "#7a7a90", "center");
    const wr = titleWbRect();
    ctx.fillStyle = "#2a2030"; ctx.strokeStyle = "#f5cd46"; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(wr.x, wr.y, wr.w, wr.h, 10); ctx.fill(); ctx.stroke();
    text("VESTUARIO", wr.x + wr.w / 2, wr.y + wr.h / 2 + 6, 15, "#f5cd46", "center");
    const orr = titleOptRect();
    ctx.fillStyle = "#1f2a30"; ctx.strokeStyle = "#7fd6ff"; ctx.lineWidth = 2; ctx.beginPath(); ctx.roundRect(orr.x, orr.y, orr.w, orr.h, 10); ctx.fill(); ctx.stroke();
    text("OPCIONES", orr.x + orr.w / 2, orr.y + orr.h / 2 + 6, 15, "#7fd6ff", "center");
    text("build " + VERSION, W / 2, H - 14 - safeB, 11, "#586", "center");
  }
  if (state === "over") {
    ctx.fillStyle = "rgba(6,6,12,0.8)"; ctx.fillRect(0, 0, W, H);
    text("GAME OVER", W / 2, H / 2 - 30, Math.min(64, W / 8), "#eb5040", "center");
    let mAll = 0, tAll = 0; for (const lk of LANGS) { const md = masteredTotalL(LESSONS[lk]); mAll += md[0]; tAll += md[1]; }
    text("PUNTAJE  " + score, W / 2, H / 2 + 22, 26, "#fff", "center");
    text("APRENDIDAS " + words + "    DOMINADAS " + mAll + "/" + tAll + " (EN+ZH)", W / 2, H / 2 + 52, 15, "#60d050", "center");
    text("RECORD  " + best, W / 2, H / 2 + 76, 15, "#9a9ab0", "center");
    text("TOCA PARA REINTENTAR", W / 2, H / 2 + 110, 20, "#f5cd46", "center");
  }
}

// roundRect fallback (navegadores viejos)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) { this.beginPath(); this.moveTo(x + r, y); this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r); this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath(); return this; };
}

let last = performance.now();
function frame(now) { let dt = (now - last) / 1000; last = now; if (dt > 0.05) dt = 0.05; update(dt); render(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);

// PWA: instalable + offline + actualiza solo (network-first)
if ("serviceWorker" in navigator) { try { navigator.serviceWorker.register("sw.js"); } catch (e) {} }
</script>
